<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Victoria's Secret</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ======================== RESET ======================== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        button { font-family: inherit; border: none; background: none; cursor: pointer; color: inherit; }
        input { font-family: inherit; border: none; outline: none; background: none; }
        img { display: block; }
        ::-webkit-scrollbar { width: 0; height: 0; }

        /* ======================== TOKENS ======================== */
        :root {
            --bg: #FDF6F8;
            --bg-warm: #FAEDF1;
            --card: #FFFFFF;
            --text: #1C1917;
            --text-sec: #8A7E7F;
            --text-tri: #C4B8BA;
            --accent: #C4957A;
            --accent-h: #B5846B;
            --accent-l: #F8E4EC;
            --accent-t: #FFFFFF;
            --border: #EDE2E5;
            --danger: #D45D5D;
            --danger-l: #FDEAEA;
            --success: #6B9E6F;
            --fav-color: #E25555;
            --r-s: 8px;
            --r-m: 14px;
            --r-l: 20px;
            --safe-t: env(safe-area-inset-top, 0px);
            --safe-b: env(safe-area-inset-bottom, 0px);
            --header-h: 56px;
            --filter-h: 52px;
        }

        /* ======================== HEADER ======================== */
        /* z-index: 110 — самый верхний фиксированный элемент */
        .app-header {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 110;
            height: calc(var(--header-h) + var(--safe-t));
            padding-top: var(--safe-t);
            background: rgba(253,246,248,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding-left: 20px; padding-right: 16px;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 15px; font-weight: 600;
            letter-spacing: 1.5px; text-transform: uppercase;
        }
        .header-actions { display: flex; gap: 2px; align-items: center; }
        .header-btn {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; position: relative;
            transition: background 0.2s;
        }
        .header-btn:active { background: var(--accent-l); }
        /* Сортировка — индикатор активности */
        .header-btn.sort-active { color: var(--accent); }
        .header-btn.sort-active::after {
            content: ''; position: absolute;
            bottom: 5px; right: 5px;
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--accent);
        }
        /* Бейдж корзины */
        .cart-badge {
            position: absolute; top: 1px; right: 1px;
            min-width: 18px; height: 18px; border-radius: 9px;
            background: var(--accent); color: var(--accent-t);
            font-size: 11px; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            padding: 0 5px;
            transform: scale(0);
            transition: transform 0.25s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .cart-badge.visible { transform: scale(1); }
        .cart-badge.bounce { animation: badgeBounce 0.3s ease; }
        @keyframes badgeBounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }

        /* ======================== SEARCH ======================== */
        /* z-index: 105 — выше фильтров, ниже хедера */
        .search-bar {
            position: fixed;
            top: calc(var(--header-h) + var(--safe-t));
            left: 0; right: 0;
            z-index: 105;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex; align-items: center; gap: 10px;
            height: 58px;
            transform: translateY(-110%);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
            pointer-events: none;
        }
        .search-bar.open {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .search-bar input {
            flex: 1; height: 40px; padding: 0 16px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--r-s); font-size: 15px; color: var(--text);
        }
        .search-bar input::placeholder { color: var(--text-tri); }
        .search-close-btn {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }
        .search-close-btn:active { background: var(--bg-warm); }

        /* ======================== FILTER BAR ======================== */
        /* z-index: 100 — ниже поиска и хедера */
        .filter-bar {
            position: fixed;
            top: calc(var(--header-h) + var(--safe-t));
            left: 0; right: 0;
            z-index: 100;
            background: var(--bg);
            height: var(--filter-h);
            padding: 10px 0 8px;
            display: flex; align-items: center;
            transition: top 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        /* Когда поиск открыт — сдвигаем вниз */
        .filter-bar.shifted-down {
            top: calc(var(--header-h) + var(--safe-t) + 58px);
        }
        .filter-scroll {
            display: flex; gap: 8px; padding: 0 20px;
            overflow-x: auto; -webkit-overflow-scrolling: touch;
            flex: 1;
        }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .cat-chip {
            flex-shrink: 0; padding: 8px 16px; border-radius: 100px;
            font-size: 13px; font-weight: 500;
            border: 1px solid var(--border); background: var(--card);
            color: var(--text-sec); transition: all 0.2s; white-space: nowrap;
        }
        .cat-chip:active { transform: scale(0.96); }
        .cat-chip.active {
            background: var(--text); color: var(--accent-t); border-color: var(--text);
        }
        /* Чип избранного */
        .cat-chip.fav-chip { display: inline-flex; align-items: center; gap: 5px; }
        .cat-chip.fav-chip i { font-size: 12px; }
        .cat-chip.fav-chip.active i { color: #F8C8CC; }
        /* Мини-бейдж счётчика на чипе избранного */
        .fav-chip-badge {
            background: var(--fav-color); color: #fff;
            font-size: 9px; font-weight: 700;
            min-width: 16px; height: 16px; border-radius: 8px;
            display: none; align-items: center; justify-content: center;
            padding: 0 4px; margin-left: 2px;
        }
        .fav-chip-badge.visible { display: inline-flex; }

        /* ======================== MAIN ======================== */
        .main-content {
            padding-top: calc(var(--header-h) + var(--safe-t) + var(--filter-h));
            padding-bottom: calc(var(--safe-b) + 24px);
            min-height: 100vh;
        }

        /* ======================== PRODUCT GRID ======================== */
        .product-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 14px; padding: 14px 16px;
        }
        @media (min-width:600px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); gap: 18px; padding: 18px 24px; }
        }
        @media (min-width:900px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); max-width: 920px; margin: 0 auto; }
        }

        /* ======================== PRODUCT CARD ======================== */
        .product-card {
            background: var(--card); border-radius: var(--r-m);
            overflow: hidden; box-shadow: 0 1px 8px rgba(28,25,23,0.04);
            cursor: pointer;
            opacity: 0; animation: cardIn 0.4s ease forwards;
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .product-card:active { transform: scale(0.97) !important; }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Изображение с LQIP */
        .card-img-wrap {
            width: 100%; aspect-ratio: 3/4;
            background: var(--bg-warm); position: relative; overflow: hidden;
        }
        .card-img-wrap::before {
            content: ''; position: absolute; inset: 0;
            background: var(--bg-warm);
            filter: blur(20px); transform: scale(1.2);
            z-index: 1; transition: opacity 0.6s;
        }
        .card-img-wrap.loaded::before { opacity: 0; pointer-events: none; }
        .card-img-wrap img {
            width: 100%; height: 100%; object-fit: cover;
            position: relative; z-index: 2;
            opacity: 0; transition: opacity 0.6s ease;
        }
        .card-img-wrap.loaded img { opacity: 1; }

        /* Бейдж на карточке */
        .card-badge {
            position: absolute; top: 10px; left: 10px; z-index: 5;
            padding: 3px 10px; border-radius: 100px;
            font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .card-badge.type-new { background: var(--card); color: var(--accent); box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
        .card-badge.type-hit { background: var(--accent); color: var(--accent-t); }
        .card-badge.type-pre { background: #E8E0F0; color: #7B6B8D; }

        /* Сердечко избранного */
        .card-fav-btn {
            position: absolute; top: 10px; right: 10px; z-index: 5;
            width: 34px; height: 34px; border-radius: 50%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: var(--text-tri);
            transition: all 0.25s; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .card-fav-btn:active { transform: scale(0.85); }
        .card-fav-btn.is-fav { color: var(--fav-color); }
        .card-fav-btn.is-fav i { font-weight: 900; }

        /* Кнопка + в корзину */
        .card-add-btn {
            position: absolute; bottom: 10px; right: 10px; z-index: 5;
            min-width: 36px; height: 36px; border-radius: 50%;
            background: var(--card); box-shadow: 0 2px 12px rgba(28,25,23,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 600; color: var(--text);
            border: 1px solid var(--border); transition: all 0.2s; padding: 0 2px;
        }
        .card-add-btn:active { transform: scale(0.85); }
        .card-add-btn.in-cart {
            background: var(--accent); color: var(--accent-t);
            border-color: var(--accent); box-shadow: 0 4px 16px rgba(196,149,122,0.35);
        }
        @keyframes btnPop { 0%{transform:scale(1)} 50%{transform:scale(1.25)} 100%{transform:scale(1)} }
        .card-add-btn.pop-anim { animation: btnPop 0.25s ease; }

        /* Кнопка поделиться */
        .card-share-btn {
            position: absolute; bottom: 10px; left: 10px; z-index: 5;
            width: 34px; height: 34px; border-radius: 50%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; color: var(--text-tri);
            transition: all 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .card-share-btn:active { transform: scale(0.85); color: var(--accent); }

        /* Инфо карточки */
        .card-info { padding: 12px 14px 14px; }
        .card-name {
            font-family: 'Playfair Display', serif;
            font-size: 13.5px; font-weight: 500; line-height: 1.35; margin-bottom: 6px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .card-price { font-size: 14.5px; font-weight: 600; color: var(--accent); }
        .card-price.is-preorder { font-size: 12.5px; font-weight: 500; color: #7B6B8D; font-style: italic; }

        /* Анимация полёта в корзину */
        .fly-dot {
            position: fixed; width: 14px; height: 14px; border-radius: 50%;
            background: var(--accent); z-index: 9999; pointer-events: none;
            box-shadow: 0 0 12px rgba(196,149,122,0.5);
            transition: left 0.45s cubic-bezier(0.22,0.61,0.36,1),
                        top 0.45s cubic-bezier(0.22,0.61,0.36,1),
                        transform 0.45s cubic-bezier(0.22,0.61,0.36,1),
                        opacity 0.35s;
        }

        /* ======================== EMPTY STATE ======================== */
        .empty-state {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 80px 40px; text-align: center;
        }
        .empty-icon {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--accent-l);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: var(--accent); margin-bottom: 24px;
        }
        .empty-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px; font-weight: 500; margin-bottom: 8px;
        }
        .empty-desc { font-size: 14px; color: var(--text-sec); line-height: 1.5; max-width: 260px; }

        /* Ссылка «Написать нам» */
        .contact-link {
            display: flex; justify-content: center; padding: 16px 0 4px;
        }
        .contact-link button {
            font-size: 13px; color: var(--text-sec);
            display: flex; align-items: center; gap: 7px;
            padding: 8px 18px; border-radius: 100px; transition: all 0.2s;
        }
        .contact-link button:active { color: var(--accent); background: var(--accent-l); }

        /* ======================== OVERLAY SYSTEM ======================== */
        /* z-index: 190 — фон за панелями */
        .overlay-backdrop {
            position: fixed; inset: 0; z-index: 190;
            background: rgba(28,25,23,0.25);
            backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .overlay-backdrop.open { opacity: 1; pointer-events: auto; }

        /* z-index: 200 — панели деталей и корзины */
        .overlay-panel {
            position: fixed; inset: 0; z-index: 200;
            background: var(--bg);
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
            overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .overlay-panel.open { transform: translateX(0); }

        /* Навигация внутри панелей */
        .panel-nav {
            position: sticky; top: 0; z-index: 10;
            height: calc(52px + var(--safe-t)); padding-top: var(--safe-t);
            display: flex; align-items: center; padding-left: 8px; padding-right: 16px;
            background: rgba(253,246,248,0.88);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        }
        .panel-nav .back-btn {
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: background 0.2s;
        }
        .panel-nav .close-btn {
            margin-left: auto; width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: var(--text-sec); transition: background 0.2s;
        }
        .panel-nav .back-btn:active,
        .panel-nav .close-btn:active { background: var(--accent-l); }

        /* ======================== DETAIL PANEL ======================== */
        .detail-hero-img {
            width: 100%; aspect-ratio: 3/4; max-height: 55vh;
            object-fit: cover; background: var(--bg-warm); display: block;
        }
        .detail-body { padding: 24px 22px 130px; }
        .detail-cat-label {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--text-tri); margin-bottom: 8px;
        }
        .detail-product-name {
            font-family: 'Playfair Display', serif;
            font-size: 24px; font-weight: 600; line-height: 1.3; margin-bottom: 12px;
        }
        .detail-product-price {
            font-size: 22px; font-weight: 600; color: var(--accent); margin-bottom: 20px;
        }
        .detail-product-price.is-preorder {
            font-size: 16px; font-weight: 500; color: #7B6B8D; font-style: italic;
        }
        .detail-product-desc { font-size: 14.5px; line-height: 1.7; color: var(--text-sec); }
        .detail-sticky-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 11;
            padding: 16px 22px calc(16px + var(--safe-b));
            background: linear-gradient(to top, var(--bg) 55%, transparent);
        }
        .detail-sticky-bar button {
            width: 100%; height: 54px; border-radius: var(--r-m);
            background: var(--text); color: var(--accent-t);
            font-size: 15px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: background 0.2s, transform 0.15s;
        }
        .detail-sticky-bar button:active { transform: scale(0.98); background: var(--accent); }
        .detail-sticky-bar button.is-added { background: var(--success); }

        /* ======================== CART PANEL ======================== */
        .cart-nav-title {
            font-family: 'Playfair Display', serif;
            font-size: 19px; font-weight: 600; margin-left: 8px;
        }
        .cart-nav-count { font-size: 14px; color: var(--text-sec); margin-left: 6px; font-weight: 400; }
        .cart-items-list { padding: 8px 16px; }
        .cart-item {
            display: flex; gap: 14px; padding: 14px 0;
            border-bottom: 1px solid var(--border);
            animation: cartItemIn 0.3s ease both;
        }
        @keyframes cartItemIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .cart-item-img { width: 76px; height: 96px; border-radius: var(--r-s); overflow: hidden; flex-shrink: 0; background: var(--bg-warm); }
        .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item-body { flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
        .cart-item-name {
            font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 500; line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .cart-item-row { display: flex; align-items: center; justify-content: space-between; }
        .cart-item-price { font-size: 14.5px; font-weight: 600; color: var(--accent); }
        .qty-controls { display: flex; align-items: center; }
        .qty-btn {
            width: 30px; height: 30px; border-radius: var(--r-s);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: var(--text);
            border: 1px solid var(--border); transition: all 0.15s;
        }
        .qty-btn:active { background: var(--accent-l); border-color: var(--accent); }
        .qty-value { width: 32px; text-align: center; font-size: 14px; font-weight: 600; }
        .cart-item-del {
            align-self: flex-start; width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; color: var(--text-tri); flex-shrink: 0; transition: color 0.2s;
        }
        .cart-item-del:active { color: var(--danger); }

        .cart-footer-bar {
            position: sticky; bottom: 0; z-index: 10;
            background: var(--bg); border-top: 1px solid var(--border);
            padding: 14px 20px calc(14px + var(--safe-b));
        }
        .cart-delivery-note {
            font-size: 12px; color: var(--text-sec); text-align: center;
            margin-bottom: 12px; line-height: 1.4; font-style: italic;
        }
        .cart-total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
        .cart-total-label { font-size: 15px; }
        .cart-total-value { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; }
        .checkout-open-btn {
            width: 100%; height: 52px; border-radius: var(--r-m);
            background: var(--text); color: var(--accent-t);
            font-size: 15px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.2s, transform 0.15s;
        }
        .checkout-open-btn:active { transform: scale(0.98); background: var(--accent); }

        /* ======================== CHECKOUT MODAL ======================== */
        /* z-index: 300 */
        .checkout-modal {
            position: fixed; inset: 0; z-index: 300;
            display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .checkout-modal.open { opacity: 1; pointer-events: auto; }
        .checkout-modal-bg {
            position: absolute; inset: 0;
            background: rgba(28,25,23,0.3);
            backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
        }
        .checkout-sheet {
            position: relative; z-index: 1;
            width: 100%; max-width: 500px;
            background: var(--card);
            border-radius: var(--r-l) var(--r-l) 0 0;
            padding: 12px 24px calc(24px + var(--safe-b));
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
            max-height: 80vh; overflow-y: auto;
        }
        .checkout-modal.open .checkout-sheet { transform: translateY(0); }
        .sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 20px; }
        .sheet-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-sec); margin-bottom: 8px; }

    /* ================================================================
       АНИМАЦИЯ «ПОЛЁТ В КОРЗИНУ»
       ================================================================ */
    function animateFlyToCart(fromElement) {
        var fromRect = fromElement.getBoundingClientRect();
        var toEl = document.getElementById("cartBadge");
        var toRect = toEl.getBoundingClientRect();

        var dot = document.createElement("div");
        dot.className = "fly-dot";
        dot.style.left = (fromRect.left + fromRect.width / 2 - 7) + "px";
        dot.style.top = (fromRect.top + fromRect.height / 2 - 7) + "px";
        document.body.appendChild(dot);

        requestAnimationFrame(function() {
            requestAnimationFrame(function() {
                dot.style.left = (toRect.left + toRect.width / 2 - 7) + "px";
                dot.style.top = (toRect.top + toRect.height / 2 - 7) + "px";
                dot.style.transform = "scale(0.3)";
                dot.style.opacity = "0.2";
            });
        });

        setTimeout(function() { dot.remove(); }, 500);
    }

    /* ================================================================
       РЕНДЕР: ФИЛЬТР-БАР (категории + избранное)
       ================================================================ */
    function renderFilterBar() {
        var scroll = document.getElementById("filterScroll");
        var html = "";

        // Категории
        for (var i = 0; i < categoryDefs.length; i++) {
            var cat = categoryDefs[i];
            var activeClass = state.selectedCategory === cat.key ? " active" : "";
            html += '<button class="cat-chip' + activeClass + '" data-category="' + cat.key + '">' + cat.label + '</button>';
        }

        // Избранное
        var favActive = state.selectedCategory === "fav" ? " active" : "";
        var favCount = state.favorites.length;
        var badgeHtml = favCount > 0
            ? '<span class="fav-chip-badge visible">' + favCount + '</span>'
            : '<span class="fav-chip-badge">' + favCount + '</span>';
        html += '<button class="cat-chip fav-chip' + favActive + '" data-category="fav"><i class="' + (favActive ? 'fas' : 'far') + ' fa-heart"></i> Избранное' + badgeHtml + '</button>';

        scroll.innerHTML = html;

        // Обработчики кликов по категориям
        var chips = scroll.querySelectorAll(".cat-chip");
        for (var j = 0; j < chips.length; j++) {
            chips[j].addEventListener("click", function() {
                state.selectedCategory = this.getAttribute("data-category");
                renderFilterBar();
                renderCatalog();
            });
        }
    }

    /* Обновить только бейдж на чипе избранного (без полного ре-рендера) */
    function updateFavChipBadge() {
        var badge = document.querySelector(".fav-chip-badge");
        if (!badge) return;
        var count = state.favorites.length;
        badge.textContent = count;
        if (count > 0) badge.classList.add("visible");
        else badge.classList.remove("visible");
    }

    /* ================================================================
       РЕНДЕР: КАТАЛОГ
       ================================================================ */
    function getFilteredProducts() {
        var list = products.slice();

        // Фильтр по категории / избранному
        if (state.selectedCategory === "fav") {
            list = list.filter(function(p) { return state.favorites.indexOf(p.id) > -1; });
        } else if (state.selectedCategory !== "all") {
            list = list.filter(function(p) { return p.category === state.selectedCategory; });
        }

        // Фильтр по поиску
        if (state.searchQuery.trim()) {
            var q = state.searchQuery.toLowerCase().trim();
            list = list.filter(function(p) {
                return p.name.toLowerCase().indexOf(q) > -1 ||
                       p.shortDescription.toLowerCase().indexOf(q) > -1 ||
                       (categoryLabels[p.category] || "").toLowerCase().indexOf(q) > -1;
            });
        }

        // Сортировка
        if (state.sortMode === "asc") {
            list.sort(function(a, b) { return a.price - b.price; });
        } else if (state.sortMode === "desc") {
            list.sort(function(a, b) { return b.price - a.price; });
        }

        return list;
    }

    function renderCatalog() {
        var filtered = getFilteredProducts();
        var main = document.getElementById("mainContent");

        if (filtered.length === 0) {
            var isFav = state.selectedCategory === "fav";
            var isSearch = state.searchQuery.trim().length > 0;
            main.innerHTML =
                '<div class="empty-state">' +
                    '<div class="empty-icon"><i class="fas ' + (isFav ? 'fa-heart' : isSearch ? 'fa-search' : 'fa-shopping-bag') + '"></i></div>' +
                    '<h2 class="empty-title">' + (isFav ? 'Пока ничего не избранно' : isSearch ? 'Ничего не найдено' : 'Товаров пока нет') + '</h2>' +
                    '<p class="empty-desc">' + (isFav ? 'Нажмите на сердечко у товара, чтобы сохранить его' : isSearch ? 'Попробуйте изменить запрос' : 'В данной категории товаров нет') + '</p>' +
                '</div>';
            return;
        }

        var html = '<div class="product-grid">';

        for (var i = 0; i < filtered.length; i++) {
            var p = filtered[i];

            // Бейдж
            var badgeHtml = '';
            if (!p.available) badgeHtml = '<span class="card-badge type-pre">Под заказ</span>';
            else if (p.badge === "new") badgeHtml = '<span class="card-badge type-new">Новинка</span>';
            else if (p.badge === "hit") badgeHtml = '<span class="card-badge type-hit">Хит</span>';

            // Избранное
            var favClass = isFavorite(p.id) ? ' is-fav' : '';
            var favIcon = isFavorite(p.id) ? 'fas' : 'far';

            // Кнопка корзины
            var cartItem = findCartItem(p.id);
            var addClass = cartItem ? ' in-cart' : '';
            var addContent = cartItem ? cartItem.quantity : '<i class="fas fa-plus"></i>';

            // Цена
            var priceHtml = p.available
                ? '<div class="card-price">' + formatPrice(p.price) + '</div>'
                : '<div class="card-price is-preorder">Под заказ</div>';

            html +=
                '<article class="product-card" data-product-id="' + p.id + '" style="animation-delay:' + (i * 0.05) + 's" tabindex="0" role="button" aria-label="' + p.name + '">' +
                    '<div class="card-img-wrap">' +
                        '<img src="' + p.image + '" alt="' + p.name + '" loading="lazy" onload="this.parentElement.classList.add(\'loaded\')">' +
                        badgeHtml +
                        '<button class="card-fav-btn' + favClass + '" data-fav-id="' + p.id + '" aria-label="Избранное"><i class="' + favIcon + ' fa-heart"></i></button>' +
                        '<button class="card-add-btn' + addClass + '" data-add-id="' + p.id + '" aria-label="В корзину">' + addContent + '</button>' +
                        '<button class="card-share-btn" data-share-id="' + p.id + '" aria-label="Поделиться"><i class="fas fa-share-alt"></i></button>' +
                    '</div>' +
                    '<div class="card-info">' +
                        '<div class="card-name">' + p.name + '</div>' +
                        priceHtml +
                    '</div>' +
                '</article>';
        }

        html += '</div>';
        html += '<div class="contact-link"><button id="contactLinkBtn"><i class="fab fa-telegram-plane"></i> Написать нам</button></div>';

        main.innerHTML = html;

        // Обработчики на карточки (открытие деталей)
        var cards = main.querySelectorAll(".product-card");
        for (var c = 0; c < cards.length; c++) {
            (function(card) {
                var handler = function() {
                    var id = parseInt(card.getAttribute("data-product-id"));
                    var product = findProduct(id);
                    if (product) openProductDetail(product);
                };
                card.addEventListener("click", function(e) {
                    if (e.target.closest(".card-fav-btn") || e.target.closest(".card-add-btn") || e.target.closest(".card-share-btn")) return;
                    handler();
                });
                card.addEventListener("keydown", function(e) { if (e.key === "Enter") handler(); });
            })(cards[c]);
        }

        // Обработчики на сердечки
        var favBtns = main.querySelectorAll(".card-fav-btn");
        for (var f = 0; f < favBtns.length; f++) {
            (function(btn) {
                btn.addEventListener("click", function(e) {
                    e.stopPropagation();
                    toggleFavorite(parseInt(btn.getAttribute("data-fav-id")));
                });
            })(favBtns[f]);
        }

        // Обработчики на кнопки «+»
        var addBtns = main.querySelectorAll(".card-add-btn");
        for (var a = 0; a < addBtns.length; a++) {
            (function(btn) {
                btn.addEventListener("click", function(e) {
                    e.stopPropagation();
                    addToCartFromCard(parseInt(btn.getAttribute("data-add-id")), btn);
                });
            })(addBtns[a]);
        }

        // Обработчики на кнопки «Поделиться»
        var shareBtns = main.querySelectorAll(".card-share-btn");
        for (var s = 0; s < shareBtns.length; s++) {
            (function(btn) {
                btn.addEventListener("click", function(e) {
                    e.stopPropagation();
                    shareProduct(parseInt(btn.getAttribute("data-share-id")));
                });
            })(shareBtns[s]);
        }

        // Кнопка «Написать нам»
        var contactBtn = main.querySelector("#contactLinkBtn");
        if (contactBtn) contactBtn.addEventListener("click", openChannelChat);
    }

    /* ================================================================
       ИЗБРАННОЕ
       ================================================================ */
    function toggleFavorite(id) {
        var idx = state.favorites.indexOf(id);
        if (idx > -1) {
            state.favorites.splice(idx, 1);
            showToast("Удалено из избранного");
        } else {
            state.favorites.push(id);
            showToast("Добавлено в избранное");
        }
        saveToStorage("favorites", state.favorites);
        updateFavButtonsOnCards();
        updateFavChipBadge();
        // Если сейчас на вкладке «Избранное» — перерендерить сетку
        if (state.selectedCategory === "fav") {
            renderCatalog();
        }
    }

    function updateFavButtonsOnCards() {
        var btns = document.querySelectorAll(".card-fav-btn");
        for (var i = 0; i < btns.length; i++) {
            var id = parseInt(btns[i].getAttribute("data-fav-id"));
            if (isFavorite(id)) {
                btns[i].classList.add("is-fav");
                btns[i].innerHTML = '<i class="fas fa-heart"></i>';
            } else {
                btns[i].classList.remove("is-fav");
                btns[i].innerHTML = '<i class="far fa-heart"></i>';
            }
        }
        // Обновить иконку на чипе
        var favChip = document.querySelector(".fav-chip");
        if (favChip) {
            var icon = favChip.querySelector("i");
            if (icon) {
                icon.className = state.selectedCategory === "fav" ? 'fas fa-heart' : (state.favorites.length > 0 ? 'fas fa-heart' : 'far fa-heart');
            }
        }
    }

    /* ================================================================
       ПОДЕЛИТЬСЯ
       ================================================================ */
    function shareProduct(id) {
        var p = findProduct(id);
        if (!p) return;
        var text = p.name + " — " + formatPrice(p.price);
        var url = CHANNEL_LINK;

        if (tg && tg.openTelegramLink) {
            var shareLink = "https://t.me/share/url?url=" + encodeURIComponent(url) + "&text=" + encodeURIComponent(text);
            tg.openTelegramLink(shareLink);
        } else if (navigator.share) {
            navigator.share({ title: p.name, text: text + "\n" + url });
        } else {
            // Fallback: копируем в буфер
            var fullText = text + "\n" + url;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(fullText).then(function() { showToast("Скопировано в буфер"); });
            } else {
                var ta = document.createElement("textarea");
                ta.value = fullText;
                ta.style.position = "fixed";
                ta.style.opacity = "0";
                document.body.appendChild(ta);
                ta.select();
                document.execCommand("copy");
                document.body.removeChild(ta);
                showToast("Скопировано в буфер");
            }
        }
    }

    /* ================================================================
       ДОБАВИТЬ В КОРЗИНУ (с карточки)
       ================================================================ */
    function addToCartFromCard(id, buttonEl) {
        var product = findProduct(id);
        if (!product) return;

        var existing = findCartItem(id);
        if (existing) {
            existing.quantity++;
        } else {
            state.cart.push({ product: product, quantity: 1 });
        }

        saveToStorage("cart", state.cart);
        updateCartBadge();
        animateFlyToCart(buttonEl);

        // Анимация кнопки
        buttonEl.classList.remove("pop-anim");
        void buttonEl.offsetWidth;
        buttonEl.classList.add("pop-anim");

        // Обновить все кнопки на карточках
        updateAddButtonsOnCards();

        // Обновить кнопку в деталях, если открыт тот же товар
        if (state.selectedProduct && state.selectedProduct.id === id) {
            var detailBtn = document.getElementById("detailAddBtn");
            detailBtn.innerHTML = '<i class="fas fa-shopping-bag"></i> Уже в корзине';
            detailBtn.classList.add("is-added");
        }

        showToast("Добавлено в корзину");
    }

    function updateAddButtonsOnCards() {
        var btns = document.querySelectorAll(".card-add-btn");
        for (var i = 0; i < btns.length; i++) {
            var id = parseInt(btns[i].getAttribute("data-add-id"));
            var item = findCartItem(id);
            if (item) {
                btns[i].classList.add("in-cart");
                btns[i].textContent = item.quantity;
            } else {
                btns[i].classList.remove("in-cart");
                btns[i].innerHTML = '<i class="fas fa-plus"></i>';
            }
        }
    }

    /* ================================================================
       ПРОСМОТР ТОВАРА (детали)
       ================================================================ */
    function openProductDetail(product) {
        state.selectedProduct = product;
        state.currentView = "detail";
        updateTelegramBackButton();

        document.getElementById("detailImg").src = product.image;
        document.getElementById("detailImg").alt = product.name;
        document.getElementById("detailCatLabel").textContent = categoryLabels[product.category] || "";
        document.getElementById("detailName").textContent = product.name;
        document.getElementById("detailDesc").textContent = product.fullDescription;

        var priceEl = document.getElementById("detailPrice");
        if (product.available) {
            priceEl.textContent = formatPrice(product.price);
            priceEl.classList.remove("is-preorder");
        } else {
            priceEl.textContent = "Под заказ — " + formatPrice(product.price);
            priceEl.classList.add("is-preorder");
        }

        // Кнопка добавления
        var btn = document.getElementById("detailAddBtn");
        var inCart = findCartItem(product.id);
        btn.className = inCart ? "is-added" : "";
        btn.innerHTML = '<i class="fas fa-shopping-bag"></i> ' + (inCart ? "Уже в корзине" : (product.available ? "Добавить в корзину" : "Предзаказать"));

        document.getElementById("overlayBackdrop").classList.add("open");
        document.getElementById("detailPanel").classList.add("open");
        document.getElementById("detailPanel").scrollTop = 0;
    }

    function closeProductDetail() {
        state.currentView = "catalog";
        state.selectedProduct = null;
        updateTelegramBackButton();
        document.getElementById("detailPanel").classList.remove("open");
        document.getElementById("overlayBackdrop").classList.remove("open");
    }

    /* ================================================================
       КОРЗИНА
       ================================================================ */
    function openCart() {
        if (state.currentView === "cart") return;
        state.currentView = "cart";
        updateTelegramBackButton();
        document.getElementById("overlayBackdrop").classList.add("open");
        document.getElementById("cartPanel").classList.add("open");
        document.getElementById("cartPanel").scrollTop = 0;
        renderCartContent();
    }

    function closeCart() {
        state.currentView = "catalog";
        updateTelegramBackButton();
        document.getElementById("cartPanel").classList.remove("open");
        document.getElementById("overlayBackdrop").classList.remove("open");
        closeCheckoutModal();
    }

    function removeFromCart(id) {
        state.cart = state.cart.filter(function(item) { return item.product.id !== id; });
        saveToStorage("cart", state.cart);
        updateCartBadge();
        updateAddButtonsOnCards();
        renderCartContent();
    }

    function changeCartQuantity(id, delta) {
        var item = findCartItem(id);
        if (!item) return;
        item.quantity += delta;
        if (item.quantity <= 0) {
            removeFromCart(id);
            return;
        }
        saveToStorage("cart", state.cart);
        updateCartBadge();
        updateAddButtonsOnCards();
        renderCartContent();
    }

    function renderCartContent() {
        var el = document.getElementById("cartContentArea");
        var count = getCartItemCount();
        document.getElementById("cartNavCount").textContent = count > 0 ? "(" + count + ")" : "";

        if (state.cart.length === 0) {
            el.innerHTML =
                '<div class="empty-state">' +
                    '<div class="empty-icon"><i class="fas fa-shopping-bag"></i></div>' +
                    '<h2 class="empty-title">Корзина пуста</h2>' +
                    '<p class="empty-desc">Выберите товары, которые вам понравятся</p>' +
                '</div>';
            return;
        }

        var html = '<div class="cart-items-list">';

        for (var i = 0; i < state.cart.length; i++) {
            var item = state.cart[i];
            html +=
                '<div class="cart-item" style="animation-delay:' + (i * 0.04) + 's">' +
                    '<div class="cart-item-img"><img src="' + item.product.image + '" alt="' + item.product.name + '"></div>' +
                    '<div class="cart-item-body">' +
                        '<div class="cart-item-name">' + item.product.name + '</div>' +
                        '<div class="cart-item-row">' +
                            '<div class="cart-item-price">' + formatPrice(item.product.price * item.quantity) + '</div>' +
                            '<div class="qty-controls">' +
                                '<button class="qty-btn" data-qty-id="' + item.product.id + '" data-qty-delta="-1" aria-label="Минус"><i class="fas fa-minus" style="font-size:10px"></i></button>' +
                                '<span class="qty-value">' + item.quantity + '</span>' +
                                '<button class="qty-btn" data-qty-id="' + item.product.id + '" data-qty-delta="1" aria-label="Плюс"><i class="fas fa-plus" style="font-size:10px"></i></button>' +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                    '<button class="cart-item-del" data-del-id="' + item.product.id + '" aria-label="Удалить"><i class="fas fa-trash-alt"></i></button>' +
                '</div>';
        }

        html += '</div>';
        html +=
            '<div class="cart-footer-bar">' +
                '<div class="cart-delivery-note">Доставка оплачивается отдельно клиентом</div>' +
                '<div class="cart-total-row">' +
                    '<span class="cart-total-label">Итого</span>' +
                    '<span class="cart-total-value">' + formatPrice(getCartTotal()) + '</span>' +
                '</div>' +
                '<button class="checkout-open-btn" id="checkoutOpenBtn">Оформить заказ <i class="fas fa-arrow-right" style="font-size:12px"></i></button>' +
            '</div>';

        el.innerHTML = html;

        // Обработчики +/- в корзине
        var qtyBtns = el.querySelectorAll(".qty-btn");
        for (var q = 0; q < qtyBtns.length; q++) {
            (function(btn) {
                btn.addEventListener("click", function() {
                    changeCartQuantity(parseInt(btn.getAttribute("data-qty-id")), parseInt(btn.getAttribute("data-qty-delta")));
                });
            })(qtyBtns[q]);
        }

        // Обработчики удаления
        var delBtns = el.querySelectorAll(".cart-item-del");
        for (var d = 0; d < delBtns.length; d++) {
            (function(btn) {
                btn.addEventListener("click", function() {
                    removeFromCart(parseInt(btn.getAttribute("data-del-id")));
                });
            })(delBtns[d]);
        }

        // Кнопка «Оформить заказ»
        var checkoutBtn = el.querySelector("#checkoutOpenBtn");
        if (checkoutBtn) checkoutBtn.addEventListener("click", openCheckoutModal);
    }

    /* ================================================================
       ОФОРМЛЕНИЕ ЗАКАЗА
       ================================================================ */
    function openCheckoutModal() {
        document.getElementById("checkoutModal").classList.add("open");

        // Автозаполнение из Telegram
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
            var user = tg.initDataUnsafe.user;
            if (user.first_name && !document.getElementById("nameInput").value) {
                document.getElementById("nameInput").value = user.first_name + (user.last_name ? " " + user.last_name : "");
            }
            if (user.username && !document.getElementById("tgInput").value) {
                document.getElementById("tgInput").value = "@" + user.username;
            }
        }

        setTimeout(function() {
            if (!document.getElementById("nameInput").value) document.getElementById("nameInput").focus();
            else if (!document.getElementById("tgInput").value) document.getElementById("tgInput").focus();
        }, 400);
    }

    function closeCheckoutModal() {
        document.getElementById("checkoutModal").classList.remove("open");
        clearFormErrors();
    }

    function clearFormErrors() {
        var inputs = document.querySelectorAll(".form-input");
        for (var i = 0; i < inputs.length; i++) inputs[i].classList.remove("has-error");
        var errors = document.querySelectorAll(".form-error-msg");
        for (var j = 0; j < errors.length; j++) errors[j].classList.remove("visible");
    }

    function submitOrder() {
        var valid = true;
        clearFormErrors();

        var nameVal = document.getElementById("nameInput").value.trim();
        var tgVal = document.getElementById("tgInput").value.trim();

        if (!nameVal) {
            document.getElementById("nameInput").classList.add("has-error");
            document.getElementById("nameError").classList.add("visible");
            valid = false;
        }
        if (!tgVal) {
            document.getElementById("tgInput").classList.add("has-error");
            document.getElementById("tgError").classList.add("visible");
            valid = false;
        }

        if (!valid) return;

        // Формируем сообщение заказа
        var lines = [
            "НОВЫЙ ЗАКАЗ",
            "──────────────",
            "Клиент: " + nameVal,
            "Telegram: " + tgVal,
            "──────────────",
            "Товары:"
        ];
        for (var i = 0; i < state.cart.length; i++) {
            var item = state.cart[i];
            lines.push("  " + item.product.name + " x" + item.quantity + " — " + formatPrice(item.product.price * item.quantity));
        }
        lines.push("──────────────");
        lines.push("Итого: " + formatPrice(getCartTotal()));
        lines.push("Доставка: оплачивается отдельно клиентом");

        var orderMessage = lines.join("\n");

        // Отправляем данные боту
        if (tg && tg.sendData) {
            try { tg.sendData(orderMessage); } catch (e) { /* игнорируем */ }
        }

        // Закрываем всё
        closeCheckoutModal();
        closeCart();
        closeProductDetail();

        // Очищаем корзину
        state.cart = [];
        saveToStorage("cart", state.cart);
        updateCartBadge();
        updateAddButtonsOnCards();

        // Показываем экран успеха
        document.getElementById("successOverlay").classList.add("open");

        // Через 1.5 секунды перенаправляем в чат канала
        setTimeout(function() {
            if (tg && tg.openTelegramLink) {
                tg.openTelegramLink(DIRECT_CHAT_LINK);
            }
        }, 1500);
    }

    function closeSuccessOverlay() {
        document.getElementById("successOverlay").classList.remove("open");
        state.currentView = "catalog";
        updateTelegramBackButton();
        renderCatalog();
    }

    /* ================================================================
       НАВИГАЦИЯ
       ================================================================ */
    function navigateBack() {
        if (state.currentView === "detail") closeProductDetail();
        else if (state.currentView === "cart") closeCart();
    }

    /* ================================================================
       ПОИСК
       ================================================================ */
    function toggleSearch(forceClose) {
        var bar = document.getElementById("searchBar");
        var filter = document.getElementById("filterBar");

        if (forceClose || state.isSearchOpen) {
            state.isSearchOpen = false;
            bar.classList.remove("open");
            filter.classList.remove("shifted-down");
            document.getElementById("searchInput").value = "";
            state.searchQuery = "";
            renderCatalog();
        } else {
            state.isSearchOpen = true;
            bar.classList.add("open");
            filter.classList.add("shifted-down");
            setTimeout(function() { document.getElementById("searchInput").focus(); }, 300);
        }
    }

    /* ================================================================
       СОРТИРОВКА
       ================================================================ */
    function cycleSortMode() {
        if (state.sortMode === "none") {
            state.sortMode = "asc";
            showToast("Сортировка: Дешевле");
        } else if (state.sortMode === "asc") {
            state.sortMode = "desc";
            showToast("Сортировка: Дороже");
        } else {
            state.sortMode = "none";
            showToast("Сортировка сброшена");
        }

        // Визуальный индикатор на кнопке
        var btn = document.getElementById("sortBtn");
        if (state.sortMode !== "none") {
            btn.classList.add("sort-active");
        } else {
            btn.classList.remove("sort-active");
        }

        renderCatalog();
    }

    /* ================================================================
       ОБРАБОТЧИКИ СОБЫТИЙ
       ================================================================ */
    function initEventListeners() {
        // Сортировка (в хедере)
        document.getElementById("sortBtn").addEventListener("click", cycleSortMode);

        // Поиск
        document.getElementById("searchBtn").addEventListener("click", function() { toggleSearch(); });
        document.getElementById("searchCloseBtn").addEventListener("click", function() { toggleSearch(true); });
        document.getElementById("searchInput").addEventListener("input", function(e) {
            state.searchQuery = e.target.value;
            renderCatalog();
        });

        // Корзина (в хедере)
        document.getElementById("cartBtn").addEventListener("click", openCart);

        // Панель деталей — закрытие
        document.getElementById("detailBackBtn").addEventListener("click", closeProductDetail);
        document.getElementById("detailCloseBtn").addEventListener("click", closeProductDetail);

        // Панель деталей — добавить в корзину
        document.getElementById("detailAddBtn").addEventListener("click", function() {
            if (!state.selectedProduct) return;
            var p = state.selectedProduct;
            var existing = findCartItem(p.id);
            if (existing) existing.quantity++;
            else state.cart.push({ product: p, quantity: 1 });
            saveToStorage("cart", state.cart);
            updateCartBadge();
            updateAddButtonsOnCards();
            var btn = document.getElementById("detailAddBtn");
            btn.innerHTML = '<i class="fas fa-shopping-bag"></i> Уже в корзине';
            btn.classList.add("is-added");
            showToast("Добавлено в корзину");
        });

        // Панель корзины — закрытие
        document.getElementById("cartBackBtn").addEventListener("click", closeCart);

        // Backdrop (закрытие панелей)
        document.getElementById("overlayBackdrop").addEventListener("click", function() {
            if (state.currentView === "detail") closeProductDetail();
            else if (state.currentView === "cart") closeCart();
        });

        // Checkout modal
        document.getElementById("checkoutModalBg").addEventListener("click", closeCheckoutModal);
        document.getElementById("submitOrderBtn").addEventListener("click", submitOrder);

        // Форма — убираем ошибки при вводе
        document.getElementById("nameInput").addEventListener("input", function() {
            document.getElementById("nameInput").classList.remove("has-error");
            document.getElementById("nameError").classList.remove("visible");
        });
        document.getElementById("tgInput").addEventListener("input", function() {
            document.getElementById("tgInput").classList.remove("has-error");
            document.getElementById("tgError").classList.remove("visible");
            // Автодобавление @
            var val = document.getElementById("tgInput").value;
            if (val.length > 0 && val.charAt(0) !== "@") {
                document.getElementById("tgInput").value = "@" + val;
            }
        });

        // Success
        document.getElementById("successBackBtn").addEventListener("click", closeSuccessOverlay);
        document.getElementById("successChatBtn").addEventListener("click", openChannelChat);
    }

    /* ================================================================
       ИНИЦИАЛИЗАЦИЯ
       ================================================================ */
    function init() {
        // Загружаем сохранённые данные
        var savedCart = loadFromStorage("cart");
        if (savedCart) state.cart = savedCart;

        var savedFavs = loadFromStorage("favorites");
        if (savedFavs) state.favorites = savedFavs;

        // Рендерим интерфейс
        renderFilterBar();
        renderCatalog();
        updateCartBadge();
        initEventListeners();
        updateTelegramBackButton();
    }

    // Запуск
    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
    } else {
        init();
    }
    </script>
</body>
</html>
