<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Victoria's Secret</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{font-size:16px;-webkit-tap-highlight-color:transparent}
        body{font-family:'DM Sans',sans-serif;background:#FDF6F8;color:#1C1917;min-height:100vh;-webkit-font-smoothing:antialiased}
        button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
        input{font-family:inherit;border:none;outline:none;background:none}
        img{display:block}
        ::-webkit-scrollbar{width:0;height:0}

        :root{
            --bg:#FDF6F8;--bg-warm:#FAEDF1;--card:#FFFFFF;
            --text:#1C1917;--text-sec:#8A7E7F;--text-tri:#C4B8BA;
            --accent:#C4957A;--accent-h:#B5846B;--accent-l:#F8E4EC;
            --border:#EDE2E5;--danger:#D45D5D;--danger-l:#FDEAEA;
            --success:#6B9E6F;--fav:#E25555;
            --rs:8px;--rm:14px;--rl:20px;
            --st:env(safe-area-inset-top,0px);
            --sb:env(safe-area-inset-bottom,0px);
            --hh:56px;
        }

        /* ===== HEADER z:100 ===== */
        .app-header{
            position:fixed;top:0;left:0;right:0;z-index:100;
            height:calc(var(--hh) + var(--st));
            padding-top:var(--st);
            padding-left:20px;padding-right:16px;
            background:#FDF6F8;
            border-bottom:1px solid var(--border);
            display:flex;align-items:center;justify-content:space-between;
            overflow:hidden;
        }
        .logo{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
        .hdr-acts{display:flex;gap:2px;align-items:center}
        .hdr-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;transition:background .2s}
        .hdr-btn:active{background:var(--accent-l)}
        .hdr-btn.sort-on{color:var(--accent)}
        .hdr-btn.sort-on::after{content:'';position:absolute;bottom:5px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
        .cbadge{position:absolute;top:1px;right:1px;min-width:18px;height:18px;border-radius:9px;background:var(--accent);color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;padding:0 5px;transform:scale(0);transition:transform .25s cubic-bezier(.175,.885,.32,1.275)}
        .cbadge.vis{transform:scale(1)}
        .cbadge.bnc{animation:bbnc .3s ease}
        @keyframes bbnc{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

        /* ===== SEARCH z:95 ===== */
        .sbar{position:fixed;top:calc(var(--hh)+var(--st));left:0;right:0;z-index:95;background:#FDF6F8;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;height:56px;transform:translateY(-110%);opacity:0;transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .25s;pointer-events:none}
        .sbar.open{transform:translateY(0);opacity:1;pointer-events:auto}
        .sbar input{flex:1;height:40px;padding:0 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);font-size:15px;color:var(--text)}
        .sbar input::placeholder{color:var(--text-tri)}
        .sbar-x{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}
        .sbar-x:active{background:var(--bg-warm)}

        /* ===== FILTERS z:90 ===== */
        .fbar{position:fixed;top:calc(var(--hh)+var(--st));left:0;right:0;z-index:90;background:#FDF6F8;border-bottom:1px solid var(--border);padding:9px 0 7px;transition:top .3s cubic-bezier(.4,0,.2,1)}
        .fbar.down{top:calc(var(--hh)+var(--st)+56px)}
        .fscroll{display:flex;gap:8px;padding:0 20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
        .fscroll::-webkit-scrollbar{display:none}
        .chip{flex-shrink:0;padding:7px 15px;border-radius:100px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--card);color:var(--text-sec);transition:all .2s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
        .chip:active{transform:scale(.96)}
        .chip.on{background:var(--text);color:#fff;border-color:var(--text)}
        .chip.fav-c i{font-size:12px}
        .chip.fav-c.on i{color:#F8C8CC}
        .fmbadge{background:var(--fav);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 4px}
        .fmbadge.vis{display:inline-flex}

        /* ===== MAIN ===== */
        .main{padding-top:calc(var(--hh)+var(--st)+50px);padding-bottom:calc(var(--sb)+24px);min-height:100vh}

        /* ===== GRID ===== */
        .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:14px 16px}
        @media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr);gap:18px;padding:18px 24px}}
        @media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr);max-width:920px;margin:0 auto}}

        /* ===== CARD ===== */
        .pcard{background:var(--card);border-radius:var(--rm);overflow:hidden;box-shadow:0 1px 8px rgba(28,25,23,.04);cursor:pointer;opacity:0;animation:pcIn .4s ease forwards;transition:transform .25s,box-shadow .25s}
        .pcard:active{transform:scale(.97)!important}
        @keyframes pcIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        .pcard-img{width:100%;aspect-ratio:3/4;background:var(--bg-warm);position:relative;overflow:hidden}
        .pcard-img::before{content:'';position:absolute;inset:0;background:var(--bg-warm);filter:blur(20px);transform:scale(1.2);z-index:1;transition:opacity .6s}
        .pcard-img.ld::before{opacity:0;pointer-events:none}
        .pcard-img img{width:100%;height:100%;object-fit:cover;position:relative;z-index:2;opacity:0;transition:opacity .6s}
        .pcard-img.ld img{opacity:1}
        .pbadge{position:absolute;top:10px;left:10px;z-index:5;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
        .pbadge.bn{background:var(--card);color:var(--accent);box-shadow:0 1px 6px rgba(0,0,0,.06)}
        .pbadge.bh{background:var(--accent);color:#fff}
        .pbadge.bp{background:#E8E0F0;color:#7B6B8D}
        .pfav{position:absolute;top:10px;right:10px;z-index:5;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-tri);transition:all .25s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
        .pfav:active{transform:scale(.85)}
        .pfav.fv{color:var(--fav)}
        .pfav.fv i{font-weight:900}
        .padd{position:absolute;bottom:10px;right:10px;z-index:5;min-width:36px;height:36px;border-radius:50%;background:var(--card);box-shadow:0 2px 12px rgba(28,25,23,.1);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--text);border:1px solid var(--border);transition:all .2s;padding:0 2px}
        .padd:active{transform:scale(.85)}
        .padd.ic{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 16px rgba(196,149,122,.35)}
        @keyframes ppop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
        .padd.ppa{animation:ppop .25s ease}
        .pshare{position:absolute;bottom:10px;left:10px;z-index:5;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-tri);transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
        .pshare:active{transform:scale(.85);color:var(--accent)}
        .pinfo{padding:12px 14px 14px}
        .pname{font-family:'Playfair Display',serif;font-size:13.5px;font-weight:500;line-height:1.35;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .pprice{font-size:14.5px;font-weight:600;color:var(--accent)}
        .pprice.pre{font-size:12.5px;font-weight:500;color:#7B6B8D;font-style:italic}
        .flydot{position:fixed;width:14px;height:14px;border-radius:50%;background:var(--accent);z-index:9999;pointer-events:none;box-shadow:0 0 12px rgba(196,149,122,.5);transition:left .45s cubic-bezier(.22,.61,.36,1),top .45s cubic-bezier(.22,.61,.36,1),transform .45s cubic-bezier(.22,.61,.36,1),opacity .35s}

        /* ===== EMPTY ===== */
        .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 40px;text-align:center}
        .empty-ic{width:80px;height:80px;border-radius:50%;background:var(--accent-l);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--accent);margin-bottom:24px}
        .empty-t{font-family:'Playfair Display',serif;font-size:20px;font-weight:500;margin-bottom:8px}
        .empty-d{font-size:14px;color:var(--text-sec);line-height:1.5;max-width:260px}
        .clink{display:flex;justify-content:center;padding:16px 0 4px}
        .clink button{font-size:13px;color:var(--text-sec);display:flex;align-items:center;gap:7px;padding:8px 18px;border-radius:100px;transition:all .2s}
        .clink button:active{color:var(--accent);background:var(--accent-l)}

        /* ===== BACKDROP z:200 ===== */
        .ovbg{position:fixed;inset:0;z-index:200;background:rgba(28,25,23,.25);opacity:0;pointer-events:none;transition:opacity .3s}
        .ovbg.open{opacity:1;pointer-events:auto}

        /* ===== PANELS z:300 ===== */
        .ovpanel{position:fixed;inset:0;z-index:300;background:#FDF6F8;transform:translateX(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
        .ovpanel.open{transform:translateX(0)}
        .pnav{position:sticky;top:0;z-index:10;height:calc(52px+var(--st));padding-top:var(--st);display:flex;align-items:center;padding-left:8px;padding-right:16px;background:#FDF6F8;border-bottom:1px solid var(--border)}
        .pnav .bk{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .2s}
        .pnav .cl{margin-left:auto;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-sec);transition:background .2s}
        .pnav .bk:active,.pnav .cl:active{background:var(--accent-l)}

        /* ===== DETAIL ===== */
        .dhero{width:100%;aspect-ratio:3/4;max-height:55vh;object-fit:cover;background:var(--bg-warm);display:block}
        .dbody{padding:24px 22px 170px}
        .dcat{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-tri);margin-bottom:8px}
        .dname{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;line-height:1.3;margin-bottom:12px}
        .dprice{font-size:22px;font-weight:600;color:var(--accent);margin-bottom:20px}
        .dprice.pre{font-size:16px;font-weight:500;color:#7B6B8D;font-style:italic}
        .ddesc{font-size:14.5px;line-height:1.7;color:var(--text-sec)}
        .dbar{position:fixed;bottom:0;left:0;right:0;z-index:11;padding:20px 22px calc(14px+var(--sb));background:linear-gradient(to top,#FDF6F8 50%,transparent)}
        .dbar button{width:100%;height:54px;border-radius:var(--rm);background:var(--text);color:#fff;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s,transform .15s}
        .dbar button:active{transform:scale(.98);background:var(--accent)}
        .dbar button.done{background:var(--success)}

        /* ===== CART ===== */
        .cnav-t{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;margin-left:8px}
        .cnav-c{font-size:14px;color:var(--text-sec);margin-left:6px;font-weight:400}
        .citems{padding:8px 16px}
        .citem{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);animation:ciIn .3s ease both}
        @keyframes ciIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .citem-img{width:76px;height:96px;border-radius:var(--rs);overflow:hidden;flex-shrink:0;background:var(--bg-warm)}
        .citem-img img{width:100%;height:100%;object-fit:cover}
        .citem-body{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0}
        .citem-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:500;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .citem-row{display:flex;align-items:center;justify-content:space-between}
        .citem-price{font-size:14.5px;font-weight:600;color:var(--accent)}
        .qctrl{display:flex;align-items:center}
        .qbtn{width:30px;height:30px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text);border:1px solid var(--border);transition:all .15s}
        .qbtn:active{background:var(--accent-l);border-color:var(--accent)}
        .qval{width:32px;text-align:center;font-size:14px;font-weight:600}
        .citem-del{align-self:flex-start;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-tri);flex-shrink:0;transition:color .2s}
        .citem-del:active{color:var(--danger)}
        .cfoot{position:sticky;bottom:0;z-index:10;background:#FDF6F8;border-top:1px solid var(--border);padding:14px 20px calc(14px+var(--sb))}
        .cnote{font-size:12px;color:var(--text-sec);text-align:center;margin-bottom:12px;line-height:1.4;font-style:italic}
        .ctotal{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
        .ctotal-l{font-size:15px}
        .ctotal-v{font-family:'Playfair Display',serif;font-size:24px;font-weight:700}
        .chkbtn{width:100%;height:52px;border-radius:var(--rm);background:var(--text);color:#fff;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s,transform .15s}
        .chkbtn:active{transform:scale(.98);background:var(--accent)}

        /* ===== CHECKOUT z:400 ===== */
        .chkmodal{position:fixed;inset:0;z-index:400;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
        .chkmodal.open{opacity:1;pointer-events:auto}
        .chkmodal-bg{position:absolute;inset:0;background:rgba(28,25,23,.3)}
        .chksheet{position:relative;z-index:1;width:100%;max-width:500px;background:var(--card);border-radius:var(--rl) var(--rl) 0 0;padding:12px 24px calc(24px+var(--sb));transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:80vh;overflow-y:auto}
        .chkmodal.open .chksheet{transform:translateY(0)}
        .shandle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 20px}
        .stitle{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;margin-bottom:20px}
        .fg{margin-bottom:16px}
        .fl{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-sec);margin-bottom:8px}
        .fi{width:100%;height:48px;padding:0 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);font-size:15px;color:var(--text);transition:border-color .2s}
        .fi:focus{border-color:var(--accent)}
        .fi.err{border-color:var(--danger);background:var(--danger-l)}
        .ferr{font-size:12px;color:var(--danger);margin-top:6px;display:none}
        .ferr.vis{display:block}
        .fnote{font-size:12.5px;color:var(--text-sec);text-align:center;line-height:1.5;padding:14px;background:var(--accent-l);border-radius:var(--rs);margin-bottom:20px;font-style:italic}
        .subbtn{width:100%;height:52px;border-radius:var(--rm);background:var(--accent);color:#fff;font-size:15px;font-weight:600;transition:background .2s,transform .15s}
        .subbtn:active{transform:scale(.98);background:var(--accent-h)}

        /* ===== SUCCESS z:500 ===== */
        .sucov{position:fixed;inset:0;z-index:500;background:#FDF6F8;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;opacity:0;pointer-events:none;transition:opacity .4s}
        .sucov.open{opacity:1;pointer-events:auto}
        .succk{width:88px;height:88px;margin-bottom:28px}
        .succk svg{width:88px;height:88px;transform:scale(0);transition:transform .5s cubic-bezier(.175,.885,.32,1.275) .15s}
        .sucov.open .succk svg{transform:scale(1)}
        .scirc{fill:none;stroke:var(--success);stroke-width:2.5;stroke-dasharray:264;stroke-dashoffset:264;transition:stroke-dashoffset .6s ease .25s}
        .sucov.open .scirc{stroke-dashoffset:0}
        .schk{fill:none;stroke:var(--success);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:40;stroke-dashoffset:40;transition:stroke-dashoffset .4s ease .65s}
        .sucov.open .schk{stroke-dashoffset:0}
        .suct{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;text-align:center;margin-bottom:10px;opacity:0;transform:translateY(12px);transition:all .4s ease .75s}
        .sucov.open .suct{opacity:1;transform:translateY(0)}
        .sucd{font-size:14.5px;color:var(--text-sec);text-align:center;line-height:1.6;max-width:280px;margin-bottom:28px;opacity:0;transform:translateY(12px);transition:all .4s ease .9s}
        .sucov.open .sucd{opacity:1;transform:translateY(0)}
        .sucacts{display:flex;flex-direction:column;gap:10px;align-items:center;opacity:0;transform:translateY(12px);transition:all .4s ease 1.05s}
        .sucov.open .sucacts{opacity:1;transform:translateY(0)}
        .sucb1{padding:14px 40px;border-radius:var(--rm);background:var(--text);color:#fff;font-size:15px;font-weight:600;transition:background .2s}
        .sucb1:active{background:var(--accent)}
        .sucb2{padding:12px 28px;border-radius:var(--rm);font-size:14px;font-weight:500;color:var(--accent);display:flex;align-items:center;gap:8px;transition:background .2s}
        .sucb2:active{background:var(--accent-l)}

        /* ===== TOAST z:9999 ===== */
        .toastel{position:fixed;bottom:calc(24px+var(--sb));left:50%;transform:translateX(-50%) translateY(16px);z-index:9999;padding:10px 22px;border-radius:100px;background:var(--text);color:#fff;font-size:13px;font-weight:500;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;box-shadow:0 6px 24px rgba(28,25,23,.15)}
        .toastel.vis{opacity:1;transform:translateX(-50%) translateY(0)}

        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>

    <!-- HEADER z:100 -->
    <header class="app-header" id="appHeader">
        <div class="logo">VICTORIA'S SECRET</div>
        <div class="hdr-acts">
            <button class="hdr-btn" id="sortBtn" aria-label="Сортировка"><i class="fas fa-arrow-down-short-wide"></i></button>
            <button class="hdr-btn" id="searchBtn" aria-label="Поиск"><i class="fas fa-search"></i></button>
            <button class="hdr-btn" id="cartBtn" aria-label="Корзина"><i class="fas fa-shopping-bag"></i><span class="cbadge" id="cartBadge">0</span></button>
        </div>
    </header>

    <!-- SEARCH z:95 -->
    <div class="sbar" id="searchBar">
        <input type="text" id="searchInput" placeholder="Поиск товаров..." autocomplete="off">
        <button class="sbar-x" id="searchCloseBtn"><i class="fas fa-times"></i></button>
    </div>

    <!-- FILTERS z:90 -->
    <div class="fbar" id="filterBar">
        <div class="fscroll" id="filterScroll"></div>
    </div>

    <!-- MAIN -->
    <main class="main" id="mainContent"></main>

    <!-- BACKDROP z:200 -->
    <div class="ovbg" id="ovBg"></div>

    <!-- DETAIL PANEL z:300 -->
    <div class="ovpanel" id="detailPanel">
        <div class="pnav">
            <button class="bk" id="detailBack"><i class="fas fa-arrow-left"></i></button>
            <button class="cl" id="detailClose"><i class="fas fa-times"></i></button>
        </div>
        <img class="dhero" id="dImg" src="" alt="">
        <div class="dbody">
            <div class="dcat" id="dCat"></div>
            <h1 class="dname" id="dName"></h1>
            <div class="dprice" id="dPrice"></div>
            <p class="ddesc" id="dDesc"></p>
        </div>
        <div class="dbar">
            <button id="dAddBtn"><i class="fas fa-shopping-bag"></i> Добавить в корзину</button>
        </div>
    </div>

    <!-- CART PANEL z:300 -->
    <div class="ovpanel" id="cartPanel">
        <div class="pnav">

function getFiltered(){
    var l=products.slice();
    if(S.cat==="fav")l=l.filter(function(p){return S.favs.indexOf(p.id)>-1});
    else if(S.cat!=="all")l=l.filter(function(p){return p.category===S.cat});
    if(S.q.trim()){var q=S.q.toLowerCase().trim();l=l.filter(function(p){return p.name.toLowerCase().indexOf(q)>-1||p.shortDescription.toLowerCase().indexOf(q)>-1||(catLabels[p.category]||"").toLowerCase().indexOf(q)>-1})}
    if(S.sort==="asc")l.sort(function(a,b){return a.price-b.price});
    else if(S.sort==="desc")l.sort(function(a,b){return b.price-a.price});
    return l;
}

function renderGrid(){
    var f=getFiltered();var m=document.getElementById("mainContent");

/* ===================== ПОДЕЛИТЬСЯ ===================== */
function shareP(id){
    var p=pFd(id);if(!p)return;
    var appUrl=APP_BASE_URL+"?startapp=p"+id;
    var text=p.name+" — "+fmt(p.price);
    var shareUrl="https://t.me/share/url?url="+encodeURIComponent(appUrl)+"&text="+encodeURIComponent(text);
    if(tg&&tg.openTelegramLink)tg.openTelegramLink(shareUrl);
    else if(navigator.share)navigator.share({title:p.name,text:text+"\n"+appUrl});
    else{var full=text+"\n"+appUrl;if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(full).then(function(){toast("Ссылка скопирована")})}

function renderCart(){
    var el=document.getElementById("cartContent");var n=cCnt();
    document.getElementById("cartNavCount").textContent=n>0?"("+n+")":"";
    if(!S.cart.length){
        el.innerHTML='<div class="empty"><div class="empty-ic"><i class="fas fa-shopping-bag"></i></div><h2 class="empty-t">Корзина пуста</h2><p class="empty-d">Выберите товары, которые вам понравятся</p></div>';
        return;
    }
    var h='<div class="citems">';
    for(var i=0;i<S.cart.length;i++){
        var it=S.cart[i];
        h+='<div class="citem" style="animation-delay:'+(i*.04)+'s"><div class="citem-img"><img src="'+it.p.image+'" alt="'+it.p.name+'"></div><div class="citem-body"><div class="citem-name">'+it.p.name+'</div><div class="citem-row"><div class="citem-price">'+fmt(it.p.price*it.q)+'</div><div class="qctrl"><button class="qbtn" data-qi="'+it.p.id+'" data-qd="-1"><i class="fas fa-minus" style="font-size:10px"></i></button><span class="qval">'+it.q+'</span><button class="qbtn" data-qi="'+it.p.id+'" data-qd="1"><i class="fas fa-plus" style="font-size:10px"></i></button></div></div></div><button class="citem-del" data-di="'+it.p.id+'"><i class="fas fa-trash-alt"></i></button></div>';
    }
    h+='</div><div class="cfoot"><div class="cnote">Доставка оплачивается отдельно клиентом</div><div class="ctotal"><span class="ctotal-l">Итого</span><span class="ctotal-v">'+fmt(cTot())+'</span></div><button class="chkbtn" id="chkOpenBtn">Оформить заказ <i class="fas fa-arrow-right" style="font-size:12px"></i></button></div>';
    el.innerHTML=h;

    var qbs=el.querySelectorAll(".qbtn");
    for(var q=0;q<qbs.length;q++){(function(b){b.addEventListener("click",function(){chQ(parseInt(b.getAttribute("data-qi")),parseInt(b.getAttribute("data-qd")))})})(qbs[q])}
    var dbs=el.querySelectorAll(".citem-del");
    for(var d=0;d<dbs.length;d++){(function(b){b.addEventListener("click",function(){rmC(parseInt(b.getAttribute("data-di")))})})(dbs[d])}
    var co=el.querySelector("#chkOpenBtn");if(co)co.addEventListener("click",openChk);
}

/* ===================== ОФОРМЛЕНИЕ ЗАКАЗА ===================== */
function openChk(){
    document.getElementById("chkModal").classList.add("open");
    if(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user){
        var u=tg.initDataUnsafe.user;
        if(u.first_name&&!document.getElementById("nameIn").value)document.getElementById("nameIn").value=u.first_name+(u.last_name?" "+u.last_name:"");
        if(u.username&&!document.getElementById("tgIn").value)document.getElementById("tgIn").value="@"+u.username;
    }
    setTimeout(function(){if(!document.getElementById("nameIn").value)document.getElementById("nameIn").focus();else if(!document.getElementById("tgIn").value)document.getElementById("tgIn").focus()},400);
}
function closeChk(){document.getElementById("chkModal").classList.remove("open");clrErr()}
function clrErr(){var is=document.querySelectorAll(".fi");for(var i=0;i<is.length;i++)is[i].classList.remove("err");var es=document.querySelectorAll(".ferr");for(var j=0;j<es.length;j++)es[j].classList.remove("vis")}

/* Отправить заказ как сообщение в выбранный чат */
function sendOrderAsMessage(){
    if(!lastOrderMessage){toast("Нет заказа для отправки");return}
    var shareUrl="https://t.me/share/url?url="+encodeURIComponent(CHANNEL_LINK)+"&text="+encodeURIComponent(lastOrderMessage);
    if(tg&&tg.openTelegramLink)tg.openTelegramLink(shareUrl);
    else window.open(shareUrl,"_blank");
}

function submitOrder(){
    var ok=true;clrErr();
    var nv=document.getElementById("nameIn").value.trim();
    var tv=document.getElementById("tgIn").value.trim();
    if(!nv){document.getElementById("nameIn").classList.add("err");document.getElementById("nameErr").classList.add("vis");ok=false}
    if(!tv){document.getElementById("tgIn").classList.add("err");document.getElementById("tgErr").classList.add("vis");ok=false}
    if(!ok)return;

    var lines=["НОВЫЙ ЗАКАЗ","──────────────","Клиент: "+nv,"Telegram: "+tv,"──────────────","Товары:"];
    for(var i=0;i<S.cart.length;i++){var it=S.cart[i];lines.push("  "+it.p.name+" x"+it.q+" — "+fmt(it.p.price*it.q))}
    lines.push("──────────────");lines.push("Итого: "+fmt(cTot()));lines.push("Доставка: оплачивается отдельно клиентом");
    lastOrderMessage=lines.join("\n");

    /* Отправляем данные боту через sendData (для автоматической обработки) */
    if(tg&&tg.sendData){try{tg.sendData(lastOrderMessage)}catch(e){}}

    /* Закрываем всё */
    closeChk();closeCart();closeDet();
    S.cart=[];sv("cart",S.cart);updCB();updAddBtns();

    /* Показываем экран успеха — он предложит отправить сообщение продавцу */
    document.getElementById("sucOv").classList.add("open");
}

function closeSuc(){
    document.getElementById("sucOv").classList.remove("open");
    S.view="catalog";updBk();renderGrid();
}

/* ===================== НАВИГАЦИЯ ===================== */
function navBack(){if(S.view==="detail")closeDet();else if(S.view==="cart")closeCart()}

/* ===================== ПОИСК ===================== */
function toggleS(fc){
    var b=document.getElementById("searchBar");var f=document.getElementById("filterBar");
    if(fc||S.sOpen){S.sOpen=false;b.classList.remove("open");f.classList.remove("down");document.getElementById("searchInput").value="";S.q="";renderGrid()}
    else{S.sOpen=true;b.classList.add("open");f.classList.add("down");setTimeout(function(){document.getElementById("searchInput").focus()},300)}
}

/* ===================== СОРТИРОВКА ===================== */
function cycSort(){
    if(S.sort==="none"){S.sort="asc";toast("Сортировка: Дешевле")}
    else if(S.sort==="asc"){S.sort="desc";toast("Сортировка: Дороже")}
    else{S.sort="none";toast("Сортировка сброшена")}
    var btn=document.getElementById("sortBtn");
    if(S.sort!=="none")btn.classList.add("sort-on");else btn.classList.remove("sort-on");
    renderGrid();
}

/* ===================== ОБРАБОТКА startapp ===================== */
function handleStart(){
    if(!tg||!tg.initDataUnsafe||!tg.initDataUnsafe.start_param)return;
    var param=tg.initDataUnsafe.start_param;
    if(param&&param.indexOf("p")===0){
        var id=parseInt(param.substring(1));
        if(id&&!isNaN(id)){var p=pFd(id);if(p)setTimeout(function(){openDet(p)},400)}
    }
}

/* ===================== СОБЫТИЯ ===================== */
function initEvents(){
    document.getElementById("sortBtn").addEventListener("click",cycSort);
    document.getElementById("searchBtn").addEventListener("click",function(){toggleS()});
    document.getElementById("searchCloseBtn").addEventListener("click",function(){toggleS(true)});
    document.getElementById("searchInput").addEventListener("input",function(e){S.q=e.target.value;renderGrid()});
    document.getElementById("cartBtn").addEventListener("click",openCart);
    document.getElementById("detailBack").addEventListener("click",closeDet);
    document.getElementById("detailClose").addEventListener("click",closeDet);
    document.getElementById("dAddBtn").addEventListener("click",function(){
        if(!S.prod)return;var p=S.prod;var ex=cIt(p.id);
        if(ex)ex.q++;else S.cart.push({p:p,q:1});
        sv("cart",S.cart);updCB();updAddBtns();
        var b=document.getElementById("dAddBtn");b.innerHTML='<i class="fas fa-shopping-bag"></i> Уже в корзине';b.classList.add("done");
        toast("Добавлено в корзину");
    });
    document.getElementById("cartBack").addEventListener("click",closeCart);
    document.getElementById("ovBg").addEventListener("click",function(){if(S.view==="detail")closeDet();else if(S.view==="cart")closeCart()});
    document.getElementById("chkModalBg").addEventListener("click",closeChk);
    document.getElementById("subBtn").addEventListener("click",submitOrder);
    document.getElementById("nameIn").addEventListener("input",function(){document.getElementById("nameIn").classList.remove("err");document.getElementById("nameErr").classList.remove("vis")});
    document.getElementById("tgIn").addEventListener("input",function(){document.getElementById("tgIn").classList.remove("err");document.getElementById("tgErr").classList.remove("vis");var v=document.getElementById("tgIn").value;if(v.length>0&&v.charAt(0)!=="@")document.getElementById("tgIn").value="@"+v});
    document.getElementById("sucBack").addEventListener("click",closeSuc);
    document.getElementById("sucSend").addEventListener("click",sendOrderAsMessage);
}

/* ===================== INIT ===================== */
function init(){
    var sc=ld("cart");if(sc)S.cart=sc;
    var sf=ld("favs");if(sf)S.favs=sf;
    renderFilters();renderGrid();updCB();initEvents();updBk();handleStart();
}
if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",init);else init();
</script>
</body>
</html>
