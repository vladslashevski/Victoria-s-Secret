<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Victoria's Secret</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{font-size:16px;-webkit-tap-highlight-color:transparent}
        body{font-family:'DM Sans',sans-serif;background:#FDF6F8;color:#1C1917;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
        button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
        input{font-family:inherit;border:none;outline:none;background:none}
        img{display:block}
        ::-webkit-scrollbar{width:0;height:0}
        :root{
            --bg:#FDF6F8;--bgw:#FAEDF1;--card:#fff;--tx:#1C1917;--txs:#8A7E7F;--txt:#C4B8BA;
            --ac:#C4957A;--ach:#B5846B;--acl:#F8E4EC;--act:#fff;--bd:#EDE2E5;
            --dg:#D45D5D;--dgl:#FDEAEA;--sc:#6B9E6F;--fv:#E25555;
            --rs:8px;--rm:14px;--rl:20px;
            --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
            --hh:56px;--fh:52px
        }

        .app-hdr{position:fixed;top:0;left:0;right:0;z-index:110;height:calc(var(--hh)+var(--st));padding-top:var(--st);background:rgba(253,246,248,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding-left:20px;padding-right:16px}
        .logo{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
        .hdr-acts{display:flex;gap:2px;align-items:center}
        .hdr-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;transition:background .2s}
        .hdr-btn:active{background:var(--acl)}
        .hdr-btn.s-on{color:var(--ac)}
        .hdr-btn.s-on::after{content:'';position:absolute;bottom:5px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--ac)}
        .c-badge{position:absolute;top:1px;right:1px;min-width:18px;height:18px;border-radius:9px;background:var(--ac);color:var(--act);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;padding:0 5px;transform:scale(0);transition:transform .25s cubic-bezier(.175,.885,.32,1.275)}
        .c-badge.vis{transform:scale(1)}
        .c-badge.bnc{animation:bb .3s ease}
        @keyframes bb{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

        .s-bar{position:fixed;top:calc(var(--hh)+var(--st));left:0;right:0;z-index:105;background:var(--bg);border-bottom:1px solid var(--bd);padding:10px 20px;display:flex;align-items:center;gap:10px;height:58px;transform:translateY(-110%);opacity:0;transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .25s;pointer-events:none}
        .s-bar.op{transform:translateY(0);opacity:1;pointer-events:auto}
        .s-bar input{flex:1;height:40px;padding:0 16px;background:var(--card);border:1px solid var(--bd);border-radius:var(--rs);font-size:15px;color:var(--tx)}
        .s-bar input::placeholder{color:var(--txt)}
        .s-cls{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}
        .s-cls:active{background:var(--bgw)}

        .f-bar{position:fixed;top:calc(var(--hh)+var(--st));left:0;right:0;z-index:100;background:var(--bg);height:var(--fh);padding:10px 0 8px;display:flex;align-items:center;transition:top .3s cubic-bezier(.4,0,.2,1)}
        .f-bar.sh{top:calc(var(--hh)+var(--st)+58px)}
        .f-scr{display:flex;gap:8px;padding:0 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1}
        .f-scr::-webkit-scrollbar{display:none}
        .chip{flex-shrink:0;padding:8px 16px;border-radius:100px;font-size:13px;font-weight:500;border:1px solid var(--bd);background:var(--card);color:var(--txs);transition:all .2s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
        .chip:active{transform:scale(.96)}
        .chip.on{background:var(--tx);color:var(--act);border-color:var(--tx)}
        .chip.fv i{font-size:12px}
        .chip.fv.on i{color:#F8C8CC}
        .fv-mb{background:var(--fv);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 4px}
        .fv-mb.vis{display:inline-flex}

        .main-c{padding-top:calc(var(--hh)+var(--st)+var(--fh));padding-bottom:calc(var(--sb)+24px);min-height:100vh}
        .p-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:14px 16px}
        @media(min-width:600px){.p-grid{grid-template-columns:repeat(3,1fr);gap:18px;padding:18px 24px}}
        @media(min-width:900px){.p-grid{grid-template-columns:repeat(4,1fr);max-width:920px;margin:0 auto}}

        .p-card{background:var(--card);border-radius:var(--rm);overflow:hidden;box-shadow:0 1px 8px rgba(28,25,23,.04);cursor:pointer;opacity:0;animation:ci .4s ease forwards;transition:transform .25s,box-shadow .25s}
        .p-card:active{transform:scale(.97)!important}
        @keyframes ci{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        .c-img{width:100%;aspect-ratio:3/4;background:var(--bgw);position:relative;overflow:hidden}
        .c-img::before{content:'';position:absolute;inset:0;background:var(--bgw);filter:blur(20px);transform:scale(1.2);z-index:1;transition:opacity .6s}
        .c-img.ld::before{opacity:0;pointer-events:none}
        .c-img img{width:100%;height:100%;object-fit:cover;position:relative;z-index:2;opacity:0;transition:opacity .6s ease}
        .c-img.ld img{opacity:1}
        .c-bdg{position:absolute;top:10px;left:10px;z-index:5;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
        .c-bdg.bn{background:var(--card);color:var(--ac);box-shadow:0 1px 6px rgba(0,0,0,.06)}
        .c-bdg.bh{background:var(--ac);color:var(--act)}
        .c-bdg.bp{background:#E8E0F0;color:#7B6B8D}
        .c-fv{position:absolute;top:10px;right:10px;z-index:5;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--txt);transition:all .25s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
        .c-fv:active{transform:scale(.85)}
        .c-fv.if{color:var(--fv)}
        .c-fv.if i{font-weight:900}
        .c-add{position:absolute;bottom:10px;right:10px;z-index:5;min-width:36px;height:36px;border-radius:50%;background:var(--card);box-shadow:0 2px 12px rgba(28,25,23,.1);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--tx);border:1px solid var(--bd);transition:all .2s;padding:0 2px}
        .c-add:active{transform:scale(.85)}
        .c-add.ic{background:var(--ac);color:var(--act);border-color:var(--ac);box-shadow:0 4px 16px rgba(196,149,122,.35)}
        @keyframes bp{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
        .c-add.pa{animation:bp .25s ease}
        .c-sh{position:absolute;bottom:10px;left:10px;z-index:5;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--txt);transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
        .c-sh:active{transform:scale(.85);color:var(--ac)}
        .c-inf{padding:12px 14px 14px}
        .c-nm{font-family:'Playfair Display',serif;font-size:13.5px;font-weight:500;line-height:1.35;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .c-pr{font-size:14.5px;font-weight:600;color:var(--ac)}
        .c-pr.ip{font-size:12.5px;font-weight:500;color:#7B6B8D;font-style:italic}
        .fly-d{position:fixed;width:14px;height:14px;border-radius:50%;background:var(--ac);z-index:9999;pointer-events:none;box-shadow:0 0 12px rgba(196,149,122,.5);transition:left .45s cubic-bezier(.22,.61,.36,1),top .45s cubic-bezier(.22,.61,.36,1),transform .45s cubic-bezier(.22,.61,.36,1),opacity .35s}

        .emp{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 40px;text-align:center}
        .emp-ic{width:80px;height:80px;border-radius:50%;background:var(--acl);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--ac);margin-bottom:24px}
        .emp-t{font-family:'Playfair Display',serif;font-size:20px;font-weight:500;margin-bottom:8px}
        .emp-d{font-size:14px;color:var(--txs);line-height:1.5;max-width:260px}
        .ct-lnk{display:flex;justify-content:center;padding:16px 0 4px}
        .ct-lnk button{font-size:13px;color:var(--txs);display:flex;align-items:center;gap:7px;padding:8px 18px;border-radius:100px;transition:all .2s}
        .ct-lnk button:active{color:var(--ac);background:var(--acl)}

        .ov-bg{position:fixed;inset:0;z-index:190;background:rgba(28,25,23,.25);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .3s}
        .ov-bg.op{opacity:1;pointer-events:auto}
        .ov-pn{position:fixed;inset:0;z-index:200;background:var(--bg);transform:translateX(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
        .ov-pn.op{transform:translateX(0)}
        .pn-nav{position:sticky;top:0;z-index:10;height:calc(52px+var(--st));padding-top:var(--st);display:flex;align-items:center;padding-left:8px;padding-right:16px;background:rgba(253,246,248,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
        .bk-btn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .2s}
        .cl-btn{margin-left:auto;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--txs);transition:background .2s}
        .bk-btn:active,.cl-btn:active{background:var(--acl)}

        .d-img{width:100%;aspect-ratio:3/4;max-height:55vh;object-fit:cover;background:var(--bgw);display:block}
        .d-body{padding:24px 22px 170px}
        .d-cl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--txt);margin-bottom:8px}
        .d-nm{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;line-height:1.3;margin-bottom:12px}
        .d-pr{font-size:22px;font-weight:600;color:var(--ac);margin-bottom:20px}
        .d-pr.ip{font-size:16px;font-weight:500;color:#7B6B8D;font-style:italic}
        .d-ds{font-size:14.5px;line-height:1.7;color:var(--txs)}
        .d-sb{position:fixed;bottom:0;left:0;right:0;z-index:11;padding:20px 22px calc(16px+var(--sb));background:linear-gradient(to top,var(--bg) 45%,transparent)}
        .d-sb button{width:100%;height:54px;border-radius:var(--rm);background:var(--tx);color:var(--act);font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s,transform .15s}
        .d-sb button:active{transform:scale(.98);background:var(--ac)}
        .d-sb button.ia{background:var(--sc)}

        .cr-tt{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;margin-left:8px}
        .cr-ct{font-size:14px;color:var(--txs);margin-left:6px;font-weight:400}
        .cr-ls{padding:8px 16px}
        .cr-it{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--bd);animation:ii .3s ease both}
        @keyframes ii{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .cr-it-i{width:76px;height:96px;border-radius:var(--rs);overflow:hidden;flex-shrink:0;background:var(--bgw)}
        .cr-it-i img{width:100%;height:100%;object-fit:cover}
        .cr-it-b{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0}
        .cr-it-n{font-family:'Playfair Display',serif;font-size:14px;font-weight:500;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .cr-it-r{display:flex;align-items:center;justify-content:space-between}
        .cr-it-p{font-size:14.5px;font-weight:600;color:var(--ac)}
        .qy-c{display:flex;align-items:center}
        .qy-b{width:30px;height:30px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--tx);border:1px solid var(--bd);transition:all .15s}
        .qy-b:active{background:var(--acl);border-color:var(--ac)}
        .qy-v{width:32px;text-align:center;font-size:14px;font-weight:600}
        .cr-it-d{align-self:flex-start;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--txt);flex-shrink:0;transition:color .2s}
        .cr-it-d:active{color:var(--dg)}
        .cr-ft{position:sticky;bottom:0;z-index:10;background:var(--bg);border-top:1px solid var(--bd);padding:14px 20px calc(14px+var(--sb))}
        .cr-dn{font-size:12px;color:var(--txs);text-align:center;margin-bottom:12px;line-height:1.4;font-style:italic}
        .cr-tr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
        .cr-tl{font-size:15px}
        .cr-tv{font-family:'Playfair Display',serif;font-size:24px;font-weight:700}
        .ch-ob{width:100%;height:52px;border-radius:var(--rm);background:var(--tx);color:var(--act);font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s,transform .15s}
        .ch-ob:active{transform:scale(.98);background:var(--ac)}

        .ch-md{position:fixed;inset:0;z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
        .ch-md.op{opacity:1;pointer-events:auto}
        .ch-md-bg{position:absolute;inset:0;background:rgba(28,25,23,.3);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
        .ch-sh{position:relative;z-index:1;width:100%;max-width:500px;background:var(--card);border-radius:var(--rl) var(--rl) 0 0;padding:12px 24px calc(24px+var(--sb));transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:80vh;overflow-y:auto}
        .ch-md.op .ch-sh{transform:translateY(0)}
        .sh-h{width:36px;height:4px;border-radius:2px;background:var(--bd);margin:0 auto 20px}
        .sh-t{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;margin-bottom:20px}
        .fm-g{margin-bottom:16px}
        .fm-l{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--txs);margin-bottom:8px}
        .fm-i{width:100%;height:48px;padding:0 16px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);font-size:15px;color:var(--tx);transition:border-color .2s}
        .fm-i:focus{border-color:var(--ac)}
        .fm-i.er{border-color:var(--dg);background:var(--dgl)}
        .fm-e{font-size:12px;color:var(--dg);margin-top:6px;display:none}
        .fm-e.vs{display:block}
        .fm-nt{font-size:12.5px;color:var(--txs);text-align:center;line-height:1.5;padding:14px;background:var(--acl);border-radius:var(--rs);margin-bottom:20px;font-style:italic}
        .su-bt{width:100%;height:52px;border-radius:var(--rm);background:var(--ac);color:var(--act);font-size:15px;font-weight:600;transition:background .2s,transform .15s}
        .su-bt:active{transform:scale(.98);background:var(--ach)}

        .su-ov{position:fixed;inset:0;z-index:400;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;opacity:0;pointer-events:none;transition:opacity .4s}
        .su-ov.op{opacity:1;pointer-events:auto}
        .su-ch{width:88px;height:88px;margin-bottom:28px}
        .su-ch svg{width:88px;height:88px;transform:scale(0);transition:transform .5s cubic-bezier(.175,.885,.32,1.275) .15s}
        .su-ov.op .su-ch svg{transform:scale(1)}
        .s-cir{fill:none;stroke:var(--sc);stroke-width:2.5;stroke-dasharray:264;stroke-dashoffset:264;transition:stroke-dashoffset .6s ease .25s}
        .su-ov.op .s-cir{stroke-dashoffset:0}
        .s-chk{fill:none;stroke:var(--sc);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:40;stroke-dashoffset:40;transition:stroke-dashoffset .4s ease .65s}
        .su-ov.op .s-chk{stroke-dashoffset:0}
        .su-tt{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;text-align:center;margin-bottom:10px;opacity:0;transform:translateY(12px);transition:all .4s ease .75s}
        .su-ov.op .su-tt{opacity:1;transform:translateY(0)}
        .su-ds{font-size:14.5px;color:var(--txs);text-align:center;line-height:1.6;max-width:280px;margin-bottom:28px;opacity:0;transform:translateY(12px);transition:all .4s ease .9s}
        .su-ov.op .su-ds{opacity:1;transform:translateY(0)}
        .su-ac{display:flex;flex-direction:column;gap:10px;align-items:center;opacity:0;transform:translateY(12px);transition:all .4s ease 1.05s}
        .su-ov.op .su-ac{opacity:1;transform:translateY(0)}
        .su-b1{padding:14px 40px;border-radius:var(--rm);background:var(--tx);color:var(--act);font-size:15px;font-weight:600;transition:background .2s}
        .su-b1:active{background:var(--ac)}
        .su-b2{padding:12px 28px;border-radius:var(--rm);font-size:14px;font-weight:500;color:var(--ac);display:flex;align-items:center;gap:8px;transition:background .2s}
        .su-b2:active{background:var(--acl)}

        .tst{position:fixed;bottom:calc(24px+var(--sb));left:50%;transform:translateX(-50%) translateY(16px);z-index:5000;padding:10px 22px;border-radius:100px;background:var(--tx);color:var(--act);font-size:13px;font-weight:500;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;box-shadow:0 6px 24px rgba(28,25,23,.15)}
        .tst.vs{opacity:1;transform:translateX(-50%) translateY(0)}

        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>

<header class="app-hdr">
    <div class="logo">VICTORIA'S SECRET</div>
    <div class="hdr-acts">
        <button class="hdr-btn" id="sortBtn" aria-label="Сортировка"><i class="fas fa-arrow-down-short-wide"></i></button>
        <button class="hdr-btn" id="searchBtn" aria-label="Поиск"><i class="fas fa-search"></i></button>
        <button class="hdr-btn" id="cartBtn" aria-label="Корзина"><i class="fas fa-shopping-bag"></i><span class="c-badge" id="cBadge">0</span></button>
    </div>
</header>

<div class="s-bar" id="sBar">
    <input type="text" id="sInput" placeholder="Поиск товаров..." autocomplete="off">
    <button class="s-cls" id="sClose"><i class="fas fa-times"></i></button>
</div>

<div class="f-bar" id="fBar">
    <div class="f-scr" id="fScr"></div>
</div>

<main class="main-c" id="mainC"></main>

<div class="ov-bg" id="ovBg"></div>

<div class="ov-pn" id="detPn">
    <div class="pn-nav">
        <button class="bk-btn" id="detBk"><i class="fas fa-arrow-left"></i></button>
        <button class="cl-btn" id="detCl"><i class="fas fa-times"></i></button>
    </div>
    <img class="d-img" id="detImg" src="" alt="">
    <div class="d-body">
        <div class="d-cl" id="detCatLbl"></div>
        <h1 class="d-nm" id="detNm"></h1>
        <div class="d-pr" id="detPr"></div>
        <p class="d-ds" id="detDs"></p>
    </div>
    <div class="d-sb"><button id="detAdd"><i class="fas fa-shopping-bag"></i> Добавить в корзину</button></div>
</div>

<div class="ov-pn" id="crtPn">
    <div class="pn-nav" style="border-bottom:1px solid var(--bd)">
        <button class="bk-btn" id="crtBk"><i class="fas fa-arrow-left"></i></button>
        <span class="cr-tt">Корзина</span>
        <span class="cr-ct" id="crtCt"></span>
    </div>
    <div id="crtCon"></div>
</div>

<div class="ch-md" id="chMd">
    <div class="ch-md-bg" id="chBg"></div>
    <div class="ch-sh">

function gFil() {

    if (S.q.trim()) {
        var q = S.q.toLowerCase().trim();
        var fl3 = [];
        for (var i3=0; i3<l.length; i3++) {
            var p = l[i3];

        }
        l = fl3;
    }
    if (S.sort==="asc") l.sort(function(a,b){return a.price-b.price});
    else if (S.sort==="desc") l.sort(function(a,b){return b.price-a.price});

}

function rmCrt(id) {
    var fl = []; for(var i=0;i<S.cart.length;i++) if(S.cart[i].p.id!==id) fl.push(S.cart[i]); S.cart=fl;
    sv("cart",S.cart); updCB(); updABtns(); rCrt();
}

function chgQ(id, d) {
    var it = cItm(id); if(!it) return; it.q += d;
    if (it.q<=0) { rmCrt(id); return; }
    sv("cart",S.cart); updCB(); updABtns(); rCrt();
}

function rCrt() {
    var el = document.getElementById("crtCon"), n = cCnt();
    document.getElementById("crtCt").textContent = n>0 ? "("+n+")" : "";
    if (!S.cart.length) {
        el.innerHTML = '<div class="emp"><div class="emp-ic"><i class="fas fa-shopping-bag"></i></div><h2 class="emp-t">Корзина пуста</h2><p class="emp-d">Выберите товары, которые вам понравятся</p></div>';
        return;
    }
    var h = '<div class="cr-ls">';
    for (var i=0; i<S.cart.length; i++) {
        var it = S.cart[i];
        h += '<div class="cr-it" style="animation-delay:'+(i*0.04)+'s">';
        h += '<div class="cr-it-i"><img src="'+it.p.image+'" alt="'+it.p.name+'"></div>';
        h += '<div class="cr-it-b"><div class="cr-it-n">'+it.p.name+'</div>';
        h += '<div class="cr-it-r"><div class="cr-it-p">'+fmt(it.p.price*it.q)+'</div>';
        h += '<div class="qy-c"><button class="qy-b" data-qi="'+it.p.id+'" data-qd="-1"><i class="fas fa-minus" style="font-size:10px"></i></button>';
        h += '<span class="qy-v">'+it.q+'</span>';
        h += '<button class="qy-b" data-qi="'+it.p.id+'" data-qd="1"><i class="fas fa-plus" style="font-size:10px"></i></button></div></div></div>';
        h += '<button class="cr-it-d" data-di="'+it.p.id+'"><i class="fas fa-trash-alt"></i></button></div>';
    }
    h += '</div><div class="cr-ft"><div class="cr-dn">Доставка оплачивается отдельно клиентом</div>';
    h += '<div class="cr-tr"><span class="cr-tl">Итого</span><span class="cr-tv">'+fmt(cTot())+'</span></div>';
    h += '<button class="ch-ob" id="chkOb">Оформить заказ <i class="fas fa-arrow-right" style="font-size:12px"></i></button></div>';
    el.innerHTML = h;

    var qbs = el.querySelectorAll(".qy-b");
    for (var q=0; q<qbs.length; q++) {
        (function(b){b.addEventListener("click",function(){chgQ(parseInt(b.getAttribute("data-qi")),parseInt(b.getAttribute("data-qd")))});})(qbs[q]);
    }
    var dbs = el.querySelectorAll(".cr-it-d");
    for (var d=0; d<dbs.length; d++) {
        (function(b){b.addEventListener("click",function(){rmCrt(parseInt(b.getAttribute("data-di")))});})(dbs[d]);
    }
    var co = el.querySelector("#chkOb");
    if (co) co.addEventListener("click", opChk);
}

function opChk() {
    document.getElementById("chMd").classList.add("op");
    if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
        var u = tg.initDataUnsafe.user;
        if (u.first_name && !document.getElementById("iNm").value) {
            document.getElementById("iNm").value = u.first_name + (u.last_name ? " " + u.last_name : "");
        }
        if (u.username && !document.getElementById("iTg").value) {
            document.getElementById("iTg").value = "@" + u.username;
        }
    }
    setTimeout(function(){
        if (!document.getElementById("iNm").value) document.getElementById("iNm").focus();
        else if (!document.getElementById("iTg").value) document.getElementById("iTg").focus();
    }, 400);
}

function clChk() {
    document.getElementById("chMd").classList.remove("op");
    clErr();
}

function clErr() {
    var is = document.querySelectorAll(".fm-i");
    for (var i=0;i<is.length;i++) is[i].classList.remove("er");
    var es = document.querySelectorAll(".fm-e");
    for (var j=0;j<es.length;j++) es[j].classList.remove("vs");
}

function subOrd() {
    var ok = true; clErr();
    var nv = document.getElementById("iNm").value.trim();
    var tv = document.getElementById("iTg").value.trim();
    if (!nv) { document.getElementById("iNm").classList.add("er"); document.getElementById("eNm").classList.add("vs"); ok=false; }
    if (!tv) { document.getElementById("iTg").classList.add("er"); document.getElementById("eTg").classList.add("vs"); ok=false; }
    if (!ok) return;

    var lines = ["\u041D\u041E\u0412\u042B\u0419 \u0417\u0410\u041A\u0410\u0417", "\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500", "\u041A\u043B\u0438\u0435\u043D\u0442: " + nv, "Telegram: " + tv, "\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500", "\u0422\u043E\u0432\u0430\u0440\u044B:"];
    for (var i=0; i<S.cart.length; i++) {
        var it = S.cart[i];
        lines.push("  " + it.p.name + " x" + it.q + " \u2014 " + fmt(it.p.price * it.q));
    }
    lines.push("\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500");
    lines.push("\u0418\u0442\u043E\u0433\u043E: " + fmt(cTot()));
    lines.push("\u0414\u043E\u0441\u0442\u0430\u0432\u043A\u0430: \u043E\u043F\u043B\u0430\u0447\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043E\u0442\u0434\u0435\u043B\u044C\u043D\u043E \u043A\u043B\u0438\u0435\u043D\u0442\u043E\u043C");

    var msg = lines.join("\n");

    if (tg && tg.sendData) {
        try { tg.sendData(msg); } catch(e) {}
    }

    clChk(); closeCrt(); closeDet();
    S.cart = []; sv("cart", S.cart); updCB(); updABtns();

    document.getElementById("suOv").classList.add("op");

    setTimeout(function() {
        if (tg && tg.openTelegramLink) {
            tg.openTelegramLink(CHAT_LINK);
        }
    }, 1500);
}

function clSuc() {
    document.getElementById("suOv").classList.remove("op");
    S.view = "catalog"; updBk(); rCat();
}

function navBack() { if(S.view==="detail") closeDet(); else if(S.view==="cart") closeCrt(); }

function togSrch(fc) {
    var b = document.getElementById("sBar"), f = document.getElementById("fBar");
    if (fc || S.sOp) {
        S.sOp = false; b.classList.remove("op"); f.classList.remove("sh");
        document.getElementById("sInput").value = ""; S.q = ""; rCat();
    } else {
        S.sOp = true; b.classList.add("op"); f.classList.add("sh");
        setTimeout(function(){document.getElementById("sInput").focus()},300);
    }
}

function cycSort() {
    if (S.sort==="none") { S.sort="asc"; toast("Сортировка: Дешевле"); }
    else if (S.sort==="asc") { S.sort="desc"; toast("Сортировка: Дороже"); }
    else { S.sort="none"; toast("Сортировка сброшена"); }
    var btn = document.getElementById("sortBtn");
    if (S.sort!=="none") btn.classList.add("s-on"); else btn.classList.remove("s-on");
    rCat();
}

function hStart() {
    if (!tg || !tg.initDataUnsafe || !tg.initDataUnsafe.start_param) return;
    var pm = tg.initDataUnsafe.start_param;
    if (pm.indexOf("p")===0) {
        var id = parseInt(pm.substring(1));
        if (id && !isNaN(id)) {
            var p = pFd(id);
            if (p) setTimeout(function(){openDet(p)},500);
        }
    }
}

function initEv() {
    document.getElementById("sortBtn").addEventListener("click", cycSort);
    document.getElementById("searchBtn").addEventListener("click", function(){togSrch()});
    document.getElementById("sClose").addEventListener("click", function(){togSrch(true)});
    document.getElementById("sInput").addEventListener("input", function(e){S.q=e.target.value; rCat()});
    document.getElementById("cartBtn").addEventListener("click", openCrt);
    document.getElementById("detBk").addEventListener("click", closeDet);
    document.getElementById("detCl").addEventListener("click", closeDet);
    document.getElementById("detAdd").addEventListener("click", function() {
        if (!S.prod) return;
        var p = S.prod, ex = cItm(p.id);
        if (ex) ex.q++; else S.cart.push({p:p,q:1});
        sv("cart",S.cart); updCB(); updABtns();
        var b = document.getElementById("detAdd");
        b.innerHTML = '<i class="fas fa-shopping-bag"></i> Уже в корзину';
        b.classList.add("ia");
        toast("Добавлено в корзину");
    });
    document.getElementById("crtBk").addEventListener("click", closeCrt);
    document.getElementById("ovBg").addEventListener("click", function(){
        if(S.view==="detail") closeDet(); else if(S.view==="cart") closeCrt();
    });
    document.getElementById("chBg").addEventListener("click", clChk);
    document.getElementById("subBtn").addEventListener("click", subOrd);
    document.getElementById("iNm").addEventListener("input", function(){
        document.getElementById("iNm").classList.remove("er"); document.getElementById("eNm").classList.remove("vs");
    });
    document.getElementById("iTg").addEventListener("input", function(){
        document.getElementById("iTg").classList.remove("er"); document.getElementById("eTg").classList.remove("vs");
        var v = document.getElementById("iTg").value;
        if (v.length>0 && v.charAt(0)!=="@") document.getElementById("iTg").value = "@"+v;
    });
    document.getElementById("suB1").addEventListener("click", clSuc);
    document.getElementById("suB2").addEventListener("click", openChat);
}

function init() {
    var sc = ld("cart"); if(sc) S.cart = sc;
    var sf = ld("favs"); if(sf) S.favs = sf;
    rFil(); rCat(); updCB(); initEv(); updBk(); hStart();
}
if (document.readyState==="loading") document.addEventListener("DOMContentLoaded", init); else init();
</script>
</body>
</html>
