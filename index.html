<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Victoria's Secret</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #FDF6F8;
            color: #1C1917;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        button { font-family: inherit; border: none; background: none; cursor: pointer; color: inherit; }
        input { font-family: inherit; border: none; outline: none; background: none; }
        img { display: block; }
        :root {
            --bg: #FDF6F8;
            --bg-warm: #FAEDF1;
            --card: #FFFFFF;
            --text: #1C1917;
            --text-sec: #8A7E7F;
            --text-tri: #C4B8BA;
            --accent: #C4957A;
            --accent-h: #B5846B;
            --accent-l: #F8E4EC;
            --accent-t: #FFFFFF;
            --border: #EDE2E5;
            --danger: #D45D5D;
            --danger-l: #FDEAEA;
            --success: #6B9E6F;
            --r-s: 8px;
            --r-m: 14px;
            --r-l: 20px;
            --safe-t: env(safe-area-inset-top, 0px);
            --safe-b: env(safe-area-inset-bottom, 0px);
            --header-h: 56px;
        }
        ::-webkit-scrollbar { width: 0; height: 0; }

        /* === HEADER === */
        .app-header {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 110;
            height: calc(var(--header-h) + var(--safe-t));
            padding-top: var(--safe-t);
            background: rgba(253,246,248,0.88);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding-left: 20px; padding-right: 16px;
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
        .header-actions { display: flex; gap: 2px; align-items: center; }
        .header-btn {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; position: relative; transition: background 0.2s;
        }
        .header-btn:active { background: var(--accent-l); }
        .cart-badge {
            position: absolute; top: 1px; right: 1px;
            min-width: 18px; height: 18px; border-radius: 9px;
            background: var(--accent); color: var(--accent-t);
            font-size: 11px; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            padding: 0 5px;
            transform: scale(0); transition: transform 0.25s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .cart-badge.visible { transform: scale(1); }
        .cart-badge.bounce { animation: bBounce 0.3s ease; }
        @keyframes bBounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }

        /* === SEARCH === */
        .search-wrap {
            position: fixed;
            top: calc(var(--header-h) + var(--safe-t));
            left: 0; right: 0;
            z-index: 105;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex; align-items: center; gap: 10px;
            transform: translateY(-110%);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
            pointer-events: none;
        }
        .search-wrap.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .search-wrap input {
            flex: 1; height: 40px; padding: 0 16px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--r-s); font-size: 15px; color: var(--text);
        }
        .search-wrap input::placeholder { color: var(--text-tri); }
        .search-close-btn { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .search-close-btn:active { background: var(--bg-warm); }

        /* === CATEGORIES + SORT === */
        .filter-bar {
            position: fixed;
            top: calc(var(--header-h) + var(--safe-t));
            left: 0; right: 0;
            z-index: 100;
            background: var(--bg);
            padding: 10px 0 8px;
            transition: top 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .filter-bar.shifted { top: calc(var(--header-h) + var(--safe-t) + 60px); }
        .filter-row { display: flex; align-items: center; gap: 8px; padding: 0 20px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .filter-row::-webkit-scrollbar { display: none; }
        .cat-chip {
            flex-shrink: 0; padding: 8px 16px; border-radius: 100px;
            font-size: 13px; font-weight: 500;
            border: 1px solid var(--border); background: var(--card);
            color: var(--text-sec); transition: all 0.2s; white-space: nowrap;
        }
        .cat-chip:active { transform: scale(0.96); }
        .cat-chip.active { background: var(--text); color: var(--accent-t); border-color: var(--text); }
        .sort-chip {
            flex-shrink: 0; padding: 8px 14px; border-radius: 100px;
            font-size: 12px; font-weight: 500;
            border: 1px dashed var(--border); background: transparent;
            color: var(--text-sec); transition: all 0.2s; white-space: nowrap;
            display: flex; align-items: center; gap: 5px;
        }
        .sort-chip:active { transform: scale(0.96); }
        .sort-chip.active { border-style: solid; color: var(--accent); border-color: var(--accent); background: var(--accent-l); }

        /* === MAIN === */
        .main-content {
            padding-top: calc(var(--header-h) + var(--safe-t) + 58px);
            padding-bottom: calc(var(--safe-b) + 24px);
            min-height: 100vh;
        }

        /* === PRODUCT GRID === */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 14px 16px; }
        @media(min-width:600px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 18px; padding: 18px 24px; } }
        @media(min-width:900px) { .product-grid { grid-template-columns: repeat(4, 1fr); max-width: 920px; margin: 0 auto; } }

        /* === PRODUCT CARD === */
        .product-card {
            background: var(--card); border-radius: var(--r-m);
            overflow: hidden; box-shadow: 0 1px 8px rgba(28,25,23,0.04);
            cursor: pointer; opacity: 0; animation: cardFadeIn 0.4s ease forwards;
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .product-card:active { transform: scale(0.97) !important; }
        @keyframes cardFadeIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

        .card-image-wrap {
            width: 100%; aspect-ratio: 3/4;
            background: var(--bg-warm); position: relative; overflow: hidden;
        }
        /* LQIP blur placeholder */
        .card-image-wrap::before {
            content: ''; position: absolute; inset: 0;
            background: var(--bg-warm);
            filter: blur(20px); transform: scale(1.2);
            z-index: 1; transition: opacity 0.5s;
        }
        .card-image-wrap.loaded::before { opacity: 0; pointer-events: none; }
        .card-image-wrap img {
            width: 100%; height: 100%; object-fit: cover;
            position: relative; z-index: 2;
            opacity: 0; transition: opacity 0.5s ease;
        }
        .card-image-wrap.loaded img { opacity: 1; }

        /* Badge */
        .card-badge {
            position: absolute; top: 10px; left: 10px; z-index: 5;
            padding: 3px 10px; border-radius: 100px;
            font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .card-badge.new-badge { background: var(--card); color: var(--accent); box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
        .card-badge.hit-badge { background: var(--accent); color: var(--accent-t); }
        .card-badge.preorder-badge { background: #E8E0F0; color: #7B6B8D; }

        /* Fav heart */
        .card-fav {
            position: absolute; top: 10px; right: 10px; z-index: 5;
            width: 34px; height: 34px; border-radius: 50%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: var(--text-tri);
            transition: all 0.25s; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .card-fav:active { transform: scale(0.85); }
        .card-fav.faved { color: #E25555; }
        .card-fav.faved i { font-weight: 900; }

        /* Add to cart button on card */
        .card-add-btn {
            position: absolute; bottom: 10px; right: 10px; z-index: 5;
            min-width: 36px; height: 36px; border-radius: 50%;
            background: var(--card); box-shadow: 0 2px 12px rgba(28,25,23,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 600; color: var(--text);
            border: 1px solid var(--border);
            transition: all 0.2s; padding: 0 2px;
        }
        .card-add-btn:active { transform: scale(0.85); }
        .card-add-btn.in-cart {
            background: var(--accent); color: var(--accent-t);
            border-color: var(--accent); box-shadow: 0 4px 16px rgba(196,149,122,0.35);
        }
        @keyframes btnPop { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }
        .card-add-btn.pop { animation: btnPop 0.25s ease; }

        /* Share button on card */
        .card-share-btn {
            position: absolute; bottom: 10px; left: 10px; z-index: 5;
            width: 34px; height: 34px; border-radius: 50%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; color: var(--text-tri);
            transition: all 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .card-share-btn:active { transform: scale(0.85); color: var(--accent); }

        .card-info { padding: 12px 14px 14px; }
        .card-name {
            font-family: 'Playfair Display', serif; font-size: 13.5px; font-weight: 500;
            line-height: 1.35; margin-bottom: 6px; color: var(--text);
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .card-price { font-size: 14.5px; font-weight: 600; color: var(--accent); }
        .card-price.preorder { font-size: 12.5px; font-weight: 500; color: #7B6B8D; font-style: italic; }

        /* Flying dot */
        .fly-dot {
            position: fixed; width: 14px; height: 14px; border-radius: 50%;
            background: var(--accent); z-index: 9999; pointer-events: none;
            box-shadow: 0 0 12px rgba(196,149,122,0.5);
            transition: left 0.45s cubic-bezier(0.22,0.61,0.36,1), top 0.45s cubic-bezier(0.22,0.61,0.36,1), transform 0.45s cubic-bezier(0.22,0.61,0.36,1), opacity 0.35s;
        }

        /* === EMPTY === */
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 40px; text-align: center; }
        .empty-icon { width: 80px; height: 80px; border-radius: 50%; background: var(--accent-l); display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--accent); margin-bottom: 24px; }
        .empty-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 500; margin-bottom: 8px; }
        .empty-desc { font-size: 14px; color: var(--text-sec); line-height: 1.5; max-width: 260px; }

        /* Contact link */
        .contact-link { display: flex; justify-content: center; padding: 16px 0 4px; }
        .contact-link button { font-size: 13px; color: var(--text-sec); display: flex; align-items: center; gap: 7px; padding: 8px 18px; border-radius: 100px; transition: all 0.2s; }
        .contact-link button:active { color: var(--accent); background: var(--accent-l); }

        /* === OVERLAY SYSTEM === */
        .overlay-backdrop {
            position: fixed; inset: 0; z-index: 190;
            background: rgba(28,25,23,0.25);
            backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .overlay-backdrop.open { opacity: 1; pointer-events: auto; }

        .overlay-panel {
            position: fixed; inset: 0; z-index: 200;
            background: var(--bg);
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
            overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .overlay-panel.open { transform: translateX(0); }

        /* Detail overlay */
        .detail-nav {
            position: sticky; top: 0; z-index: 10;
            height: calc(52px + var(--safe-t)); padding-top: var(--safe-t);
            display: flex; align-items: center; padding-left: 8px; padding-right: 16px;
            background: rgba(253,246,248,0.88);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        }
        .nav-back, .nav-close { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .nav-back { font-size: 18px; }
        .nav-close { margin-left: auto; font-size: 16px; color: var(--text-sec); }
        .nav-back:active, .nav-close:active { background: var(--accent-l); }

        .detail-hero { width: 100%; aspect-ratio: 3/4; max-height: 55vh; object-fit: cover; background: var(--bg-warm); display: block; }
        .detail-body { padding: 24px 22px 130px; }
        .detail-cat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-tri); margin-bottom: 8px; }
        .detail-product-name { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 600; line-height: 1.3; margin-bottom: 12px; }
        .detail-product-price { font-size: 22px; font-weight: 600; color: var(--accent); margin-bottom: 20px; }
        .detail-product-price.preorder { font-size: 16px; font-weight: 500; color: #7B6B8D; font-style: italic; }
        .detail-product-desc { font-size: 14.5px; line-height: 1.7; color: var(--text-sec); }
        .detail-sticky-btn {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 11;
            padding: 16px 22px calc(16px + var(--safe-b));
            background: linear-gradient(to top, var(--bg) 55%, transparent);
        }
        .detail-sticky-btn button {
            width: 100%; height: 54px; border-radius: var(--r-m);
            background: var(--text); color: var(--accent-t);
            font-size: 15px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: background 0.2s, transform 0.15s;
        }
        .detail-sticky-btn button:active { transform: scale(0.98); background: var(--accent); }
        .detail-sticky-btn button.in-cart-state { background: var(--success); }

        /* === CART === */
        .cart-nav {
            position: sticky; top: 0; z-index: 10;
            height: calc(52px + var(--safe-t)); padding-top: var(--safe-t);
            display: flex; align-items: center; padding-left: 8px; padding-right: 16px;
            background: rgba(253,246,248,0.88);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .cart-nav-title { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 600; margin-left: 8px; }
        .cart-nav-count { font-size: 14px; color: var(--text-sec); margin-left: 6px; font-weight: 400; }

        .cart-items-list { padding: 8px 16px; }
        .cart-item {
            display: flex; gap: 14px; padding: 14px 0;
            border-bottom: 1px solid var(--border);
            animation: slideUp 0.3s ease both;
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .cart-item-img { width: 76px; height: 96px; border-radius: var(--r-s); overflow: hidden; flex-shrink: 0; background: var(--bg-warm); }
        .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item-body { flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
        .cart-item-name { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 500; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .cart-item-row { display: flex; align-items: center; justify-content: space-between; }
        .cart-item-price { font-size: 14.5px; font-weight: 600; color: var(--accent); }
        .qty-controls { display: flex; align-items: center; }
        .qty-btn { width: 30px; height: 30px; border-radius: var(--r-s); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text); border: 1px solid var(--border); transition: all 0.15s; }
        .qty-btn:active { background: var(--accent-l); border-color: var(--accent); }
        .qty-num { width: 32px; text-align: center; font-size: 14px; font-weight: 600; }
        .cart-item-del { align-self: flex-start; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--text-tri); flex-shrink: 0; transition: color 0.2s; }
        .cart-item-del:active { color: var(--danger); }

        .cart-footer {
            position: sticky; bottom: 0; z-index: 10;
            background: var(--bg); border-top: 1px solid var(--border);
            padding: 14px 20px calc(14px + var(--safe-b));
        }
        .cart-delivery-note { font-size: 12px; color: var(--text-sec); text-align: center; margin-bottom: 12px; line-height: 1.4; font-style: italic; }
        .cart-total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
        .cart-total-label { font-size: 15px; }
        .cart-total-value { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; }
        .checkout-btn {
            width: 100%; height: 52px; border-radius: var(--r-m);
            background: var(--text); color: var(--accent-t);
            font-size: 15px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.2s, transform 0.15s;
        }
        .checkout-btn:active { transform: scale(0.98); background: var(--accent); }

        /* === CHECKOUT SHEET === */
        .checkout-modal {
            position: fixed; inset: 0; z-index: 300;
            display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .checkout-modal.open { opacity: 1; pointer-events: auto; }
        .checkout-modal-bg { position: absolute; inset: 0; background: rgba(28,25,23,0.3); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); }
        .checkout-sheet {
            position: relative; z-index: 1; width: 100%; max-width: 500px;
            background: var(--card); border-radius: var(--r-l) var(--r-l) 0 0;
            padding: 12px 24px calc(24px + var(--safe-b));
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
            max-height: 80vh; overflow-y: auto;
        }
        .checkout-modal.open .checkout-sheet { transform: translateY(0); }
        .sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 20px; }
        .sheet-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-sec); margin-bottom: 8px; }
        .form-input { width: 100%; height: 48px; padding: 0 16px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-s); font-size: 15px; color: var(--text); transition: border-color 0.2s; }
        .form-input:focus { border-color: var(--accent); }
        .form-input.error { border-color: var(--danger); background: var(--danger-l); }
        .form-error { font-size: 12px; color: var(--danger); margin-top: 6px; display: none; }
        .form-error.show { display: block; }
        .form-notice { font-size: 12.5px; color: var(--text-sec); text-align: center; line-height: 1.5; padding: 14px; background: var(--accent-l); border-radius: var(--r-s); margin-bottom: 20px; font-style: italic; }
        .submit-btn { width: 100%; height: 52px; border-radius: var(--r-m); background: var(--accent); color: var(--accent-t); font-size: 15px; font-weight: 600; transition: background 0.2s, transform 0.15s; }
        .submit-btn:active { transform: scale(0.98); background: var(--accent-h); }

        /* === SUCCESS === */
        .success-overlay {
            position: fixed; inset: 0; z-index: 400; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; opacity: 0; pointer-events: none; transition: opacity 0.4s;
        }
        .success-overlay.open { opacity: 1; pointer-events: auto; }
        .success-check-wrap { width: 88px; height: 88px; margin-bottom: 28px; }
        .success-check-wrap svg { width: 88px; height: 88px; transform: scale(0); transition: transform 0.5s cubic-bezier(0.175,0.885,0.32,1.275) 0.15s; }
        .success-overlay.open .success-check-wrap svg { transform: scale(1); }
        .svg-circle { fill: none; stroke: var(--success); stroke-width: 2.5; stroke-dasharray: 264; stroke-dashoffset: 264; transition: stroke-dashoffset 0.6s ease 0.25s; }
        .success-overlay.open .svg-circle { stroke-dashoffset: 0; }
        .svg-check { fill: none; stroke: var(--success); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 40; stroke-dashoffset: 40; transition: stroke-dashoffset 0.4s ease 0.65s; }
        .success-overlay.open .svg-check { stroke-dashoffset: 0; }

        @media (prefers-reduced-motion: reduce) {

   ================================================ */
function saveCart() { try { localStorage.setItem("vs_cart", JSON.stringify(state.cart)); } catch(e) {} }

   HELPERS
   ================================================ */
function fmtPrice(n) { return n.toLocaleString("ru-RU") + " Br"; }
function getCartTotal() { return state.cart.reduce((s, i) => s + i.product.price * i.quantity, 0); }
function getCartCount() { return state.cart.reduce((s, i) => s + i.quantity, 0); }
function isFav(id) { return state.favorites.includes(id); }
function getCartItem(id) { return state.cart.find(c => c.product.id === id); }

    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("visible"), 1800);
}

/* ================================================
   CART BADGE
   ================================================ */
function updateCartBadge() {
    const el = document.getElementById("cartBadge");
    const n = getCartCount();
    el.textContent = n;
    if (n > 0) {
        el.classList.add("visible");
        el.classList.remove("bounce");
        void el.offsetWidth;
        el.classList.add("bounce");
    } else {
        el.classList.remove("visible");
    }
}

/* ================================================
   FLY TO CART ANIMATION
   ================================================ */
function flyToCart(fromEl) {
    const fromRect = fromEl.getBoundingClientRect();
    const toEl = document.getElementById("cartBadge");
    const toRect = toEl.getBoundingClientRect();

    const dot = document.createElement("div");
    dot.className = "fly-dot";
    dot.style.left = (fromRect.left + fromRect.width / 2 - 7) + "px";
    dot.style.top = (fromRect.top + fromRect.height / 2 - 7) + "px";
    document.body.appendChild(dot);

    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            dot.style.left = (toRect.left + toRect.width / 2 - 7) + "px";
            dot.style.top = (toRect.top + toRect.height / 2 - 7) + "px";
            dot.style.transform = "scale(0.4)";
            dot.style.opacity = "0.3";
        });
    });

    setTimeout(() => dot.remove(), 500);
}

/* ================================================
   RENDER: FILTER BAR (categories + sort)
   ================================================ */
function renderFilterBar() {
    const row = document.getElementById("filterRow");
    let html = "";

    categoryList.forEach(c => {
        html += `<button class="cat-chip ${state.category === c.key ? "active" : ""}" data-cat="${c.key}">${c.label}</button>`;
    });

    html += `<button class="sort-chip ${state.sort !== "none" ? "active" : ""}" id="sortBtn"><i class="fas fa-arrow-down-short-wide" style="font-size:12px"></i> ${state.sort === "asc" ? "Дешевле" : state.sort === "desc" ? "Дороже" : "Цена"}</button>`;

    row.innerHTML = html;

    row.querySelectorAll(".cat-chip").forEach(btn => {
        btn.addEventListener("click", () => {
            state.category = btn.dataset.cat;
            renderFilterBar();
            renderCatalog();
        });
    });

    document.getElementById("sortBtn").addEventListener("click", () => {
        if (state.sort === "none") state.sort = "asc";
        else if (state.sort === "asc") state.sort = "desc";
        else state.sort = "none";
        renderFilterBar();
        renderCatalog();
    });
}

/* ================================================
   RENDER: CATALOG
   ================================================ */
function getFilteredProducts() {
    let list = products.slice();

    // Категория
    if (state.category !== "all") {
        list = list.filter(p => p.category === state.category);
    }

    // Поиск
    if (state.searchQuery.trim()) {
        const q = state.searchQuery.toLowerCase().trim();
        list = list.filter(p =>
            p.name.toLowerCase().includes(q) ||
            p.shortDescription.toLowerCase().includes(q) ||
            (categoryLabels[p.category] || "").toLowerCase().includes(q)
        );
    }

    // Сортировка
    if (state.sort === "asc") list.sort((a, b) => a.price - b.price);
    else if (state.sort === "desc") list.sort((a, b) => b.price - a.price);

    return list;
}

function renderCatalog() {
    const filtered = getFilteredProducts();

    if (filtered.length === 0) {
        const isSearch = state.searchQuery.trim().length > 0;

        // Избранное
        const favClass = isFav(p.id) ? " faved" : "";
        const favIcon = isFav(p.id) ? "fas" : "far";

        const cartItem = getCartItem(p.id);
        const addClass = cartItem ? " in-cart" : "";
        const addContent = cartItem ? cartItem.quantity : '<i class="fas fa-plus"></i>';

        // Цена
        const priceHtml = p.available
            ? `<div class="card-price">${fmtPrice(p.price)}</div>`
            : `<div class="card-price preorder">Под заказ</div>`;

        html += `
            <article class="product-card" data-pid="${p.id}" style="animation-delay:${i * 0.05}s" tabindex="0">
                <div class="card-image-wrap">
                    <img src="${p.image}" alt="${p.name}" loading="lazy" onload="this.parentElement.classList.add('loaded')">
                    ${badgeHtml}
                    <button class="card-fav${favClass}" data-fav-id="${p.id}" aria-label="Избранное"><i class="${favIcon} fa-heart"></i></button>
                    <button class="card-add-btn${addClass}" data-add-id="${p.id}" aria-label="В корзину">${addContent}</button>
                    <button class="card-share-btn" data-share-id="${p.id}" aria-label="Поделиться"><i class="fas fa-share-alt"></i></button>
                </div>
                <div class="card-info">
                    <div class="card-name">${p.name}</div>
                    ${priceHtml}
                </div>
            </article>`;
    });

    html += '</div>';
    html += '<div class="contact-link"><button id="contactLinkBtn"><i class="fab fa-telegram-plane"></i> Написать нам</button></div>';
    main.innerHTML = html;

    // Навешиваем события
    main.querySelectorAll(".product-card").forEach(card => {
        const handler = () => {
            const p = products.find(x => x.id === parseInt(card.dataset.pid));
            if (p) openDetail(p);
        };
        card.addEventListener("click", (e) => {
            if (e.target.closest(".card-fav") || e.target.closest(".card-add-btn") || e.target.closest(".card-share-btn")) return;
            handler();
        });
        card.addEventListener("keydown", (e) => { if (e.key === "Enter") handler(); });
    });

    main.querySelectorAll(".card-fav").forEach(btn => {
        btn.addEventListener("click", (e) => { e.stopPropagation(); toggleFavorite(parseInt(btn.dataset.favId)); });
    });

    main.querySelectorAll(".card-add-btn").forEach(btn => {
        btn.addEventListener("click", (e) => { e.stopPropagation(); addToCartFromCard(parseInt(btn.dataset.addId), btn); });
    });

    main.querySelectorAll(".card-share-btn").forEach(btn => {
        btn.addEventListener("click", (e) => { e.stopPropagation(); shareProduct(parseInt(btn.dataset.shareId)); });
    });

    const clb = main.querySelector("#contactLinkBtn");
    if (clb) clb.addEventListener("click", openChannel);
}

/* ================================================
   FAVORITES
   ================================================ */
function toggleFavorite(id) {
    const idx = state.favorites.indexOf(id);
    if (idx > -1) { state.favorites.splice(idx, 1); showToast("Удалено из избранного"); }
    else { state.favorites.push(id); showToast("Добавлено в избранное"); }
    saveFavorites();
    updateFavButtons();
}

function updateFavButtons() {
    document.querySelectorAll(".card-fav").forEach(btn => {
        const id = parseInt(btn.dataset.favId);
        if (isFav(id)) { btn.classList.add("faved"); btn.innerHTML = '<i class="fas fa-heart"></i>'; }
        else { btn.classList.remove("faved"); btn.innerHTML = '<i class="far fa-heart"></i>'; }
    });
}

/* ================================================
   SHARE
   ================================================ */
function shareProduct(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    const text = `${p.name} — ${fmtPrice(p.price)}`;
    if (tg && tg.switchInlineQuery) {
        tg.switchInlineQuery(text);
    } else {
        if (navigator.share) {
            navigator.share({ title: p.name, text: text });
        } else {
            showToast("Поделиться недоступно");
        }
    }
}

/* ================================================
   ADD TO CART (from card button)
   ================================================ */
function addToCartFromCard(id, btnEl) {
    const p = products.find(x => x.id === id);
    if (!p) return;

    const existing = getCartItem(id);
    if (existing) existing.quantity++;
    else state.cart.push({ product: p, quantity: 1 });

    saveCart();
    updateCartBadge();

    // Анимация полёта
    flyToCart(btnEl);

    // Анимация кнопки
    btnEl.classList.remove("pop");
    void btnEl.offsetWidth;
    btnEl.classList.add("pop");

    // Обновить все кнопки на карточках
    updateCardAddButtons();

    // Обновить кнопку в деталях если открыт тот же товар
    if (state.selectedProduct && state.selectedProduct.id === id) {
        const db = document.getElementById("detailAddBtn");
        db.innerHTML = '<i class="fas fa-shopping-bag"></i> Уже в корзине';
        db.classList.add("in-cart-state");
    }

    showToast("Добавлено в корзину");
}

function updateCardAddButtons() {
    document.querySelectorAll(".card-add-btn").forEach(btn => {
        const id = parseInt(btn.dataset.addId);
        const item = getCartItem(id);
        if (item) {
            btn.classList.add("in-cart");
            btn.textContent = item.quantity;
        } else {
            btn.classList.remove("in-cart");
            btn.innerHTML = '<i class="fas fa-plus"></i>';
        }
    });
}

/* ================================================
   PRODUCT DETAIL
   ================================================ */
function openDetail(product) {
    state.selectedProduct = product;
    state.view = "detail";
    updateTgBack();

    document.getElementById("detailHeroImg").src = product.image;
    document.getElementById("detailHeroImg").alt = product.name;
    document.getElementById("detailCatLabel").textContent = categoryLabels[product.category] || "";
    document.getElementById("detailName").textContent = product.name;
    document.getElementById("detailDesc").textContent = product.fullDescription;

    const priceEl = document.getElementById("detailPrice");
    if (product.available) {
        priceEl.textContent = fmtPrice(product.price);
        priceEl.classList.remove("preorder");
    } else {
        priceEl.textContent = "Под заказ — " + fmtPrice(product.price);
        priceEl.classList.add("preorder");
    }

    // Кнопка
    const btn = document.getElementById("detailAddBtn");
    const inCart = getCartItem(product.id);
    btn.className = inCart ? "in-cart-state" : "";
    btn.innerHTML = `<i class="fas fa-shopping-bag"></i> ${inCart ? "Уже в корзине" : (product.available ? "Добавить в корзину" : "Предзаказать")}`;

    document.getElementById("overlayBackdrop").classList.add("open");
    document.getElementById("detailPanel").classList.add("open");
    document.getElementById("detailPanel").scrollTop = 0;
}

function closeDetail() {
    state.view = "catalog";
    state.selectedProduct = null;
    updateTgBack();
    document.getElementById("detailPanel").classList.remove("open");
    document.getElementById("overlayBackdrop").classList.remove("open");
}

/* ================================================
   CART
   ================================================ */
function openCart() {
    if (state.view === "cart") return;
    state.view = "cart";
    updateTgBack();
    document.getElementById("overlayBackdrop").classList.add("open");
    document.getElementById("cartPanel").classList.add("open");
    document.getElementById("cartPanel").scrollTop = 0;
    renderCartContent();
}

function closeCart() {
    state.view = "catalog";
    updateTgBack();
    document.getElementById("cartPanel").classList.remove("open");
    document.getElementById("overlayBackdrop").classList.remove("open");
    closeCheckout();
}

function removeFromCart(id) {
    state.cart = state.cart.filter(c => c.product.id !== id);
    saveCart(); updateCartBadge(); updateCardAddButtons(); renderCartContent();
}

function changeCartQty(id, delta) {
    const item = getCartItem(id);
    if (!item) return;
    item.quantity += delta;
    if (item.quantity <= 0) { removeFromCart(id); return; }
    saveCart(); updateCartBadge(); updateCardAddButtons(); renderCartContent();
}

function renderCartContent() {
    const el = document.getElementById("cartContent");
    const count = getCartCount();
    document.getElementById("cartNavCount").textContent = count > 0 ? `(${count})` : "";

    if (state.cart.length === 0) {
        el.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon"><i class="fas fa-shopping-bag"></i></div>
                <h2 class="empty-title">Корзина пуста</h2>
                <p class="empty-desc">Выберите товары, которые вам понравятся</p>
            </div>`;
        return;
    }

    let html = '<div class="cart-items-list">';
    state.cart.forEach((item, i) => {
        html += `
            <div class="cart-item" style="animation-delay:${i * 0.04}s">
                <div class="cart-item-img"><img src="${item.product.image}" alt="${item.product.name}"></div>
                <div class="cart-item-body">
                    <div class="cart-item-name">${item.product.name}</div>
                    <div class="cart-item-row">
                        <div class="cart-item-price">${fmtPrice(item.product.price * item.quantity)}</div>
                        <div class="qty-controls">
                            <button class="qty-btn" data-qty-id="${item.product.id}" data-qty-d="-1" aria-label="Минус"><i class="fas fa-minus" style="font-size:10px"></i></button>
                            <span class="qty-num">${item.quantity}</span>
                            <button class="qty-btn" data-qty-id="${item.product.id}" data-qty-d="1" aria-label="Плюс"><i class="fas fa-plus" style="font-size:10px"></i></button>
                        </div>
                    </div>
                </div>
                <button class="cart-item-del" data-del-id="${item.product.id}" aria-label="Удалить"><i class="fas fa-trash-alt"></i></button>
            </div>`;
    });
    html += '</div>';

    html += `
        <div class="cart-footer">
            <div class="cart-delivery-note">Доставка оплачивается отдельно клиентом</div>
            <div class="cart-total-row">
                <span class="cart-total-label">Итого</span>
                <span class="cart-total-value">${fmtPrice(getCartTotal())}</span>
            </div>
            <button class="checkout-btn" id="checkoutOpenBtn">Оформить заказ <i class="fas fa-arrow-right" style="font-size:12px"></i></button>
        </div>`;

    el.innerHTML = html;

    el.querySelectorAll(".qty-btn").forEach(btn => {
        btn.addEventListener("click", () => changeCartQty(parseInt(btn.dataset.qtyId), parseInt(btn.dataset.qtyD)));
    });
    el.querySelectorAll(".cart-item-del").forEach(btn => {
        btn.addEventListener("click", () => removeFromCart(parseInt(btn.dataset.delId)));
    });
    const cob = el.querySelector("#checkoutOpenBtn");
    if (cob) cob.addEventListener("click", openCheckout);
}

/* ================================================
   CHECKOUT
   ================================================ */
function openCheckout() {
    document.getElementById("checkoutModal").classList.add("open");
    // Автозаполнение из Telegram
    if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
        const u = tg.initDataUnsafe.user;
        if (u.first_name && !document.getElementById("inputName").value) {
            document.getElementById("inputName").value = u.first_name + (u.last_name ? " " + u.last_name : "");
        }
        if (u.username && !document.getElementById("inputTg").value) {
            document.getElementById("inputTg").value = "@" + u.username;
        }
    }
    setTimeout(() => {
        if (!document.getElementById("inputName").value) document.getElementById("inputName").focus();
        else if (!document.getElementById("inputTg").value) document.getElementById("inputTg").focus();
    }, 400);
}

function closeCheckout() {
    document.getElementById("checkoutModal").classList.remove("open");
    clearFormErrors();
}

function clearFormErrors() {
    document.querySelectorAll(".form-input").forEach(i => i.classList.remove("error"));
    document.querySelectorAll(".form-error").forEach(e => e.classList.remove("show"));
}

function submitOrder() {
    let valid = true;
    clearFormErrors();

    const nameVal = document.getElementById("inputName").value.trim();
    const tgVal = document.getElementById("inputTg").value.trim();

    if (!nameVal) { document.getElementById("inputName").classList.add("error"); document.getElementById("errorName").classList.add("show"); valid = false; }
    if (!tgVal) { document.getElementById("inputTg").classList.add("error"); document.getElementById("errorTg").classList.add("show"); valid = false; }

    if (!valid) return;

    const message = [
        "НОВЫЙ ЗАКАЗ",
        "──────────────",
        "Клиент: " + nameVal,
        "Telegram: " + tgVal,
        "──────────────",
        "Товары:",
        ...state.cart.map(i => "  " + i.product.name + " x" + i.quantity + " — " + fmtPrice(i.product.price * i.quantity)),
        "──────────────",
        "Итого: " + fmtPrice(getCartTotal()),
        "Доставка: оплачивается отдельно клиентом"
    ].join("\n");

    if (tg && tg.sendData) {
        try { tg.sendData(message); } catch(e) { console.log("sendData error:", e); }
    }

    closeCheckout();
    closeCart();
    closeDetail();

    state.cart = [];
    saveCart();
    updateCartBadge();
    updateCardAddButtons();

    document.getElementById("successOverlay").classList.add("open");
}

function closeSuccess() {
    document.getElementById("successOverlay").classList.remove("open");
    state.view = "catalog";
    updateTgBack();
    renderCatalog();
}

/* ================================================
   NAVIGATION
   ================================================ */
function navigateBack() {
    if (state.view === "detail") closeDetail();
    else if (state.view === "cart") closeCart();
}

/* ================================================
   SEARCH
   ================================================ */
function toggleSearch(forceClose) {
    const wrap = document.getElementById("searchWrap");
    const bar = document.getElementById("filterBar");

    if (forceClose || state.searchOpen) {
        state.searchOpen = false;
        wrap.classList.remove("open");
        bar.classList.remove("shifted");
        document.getElementById("searchInput").value = "";
        state.searchQuery = "";
        renderCatalog();
    } else {
        state.searchOpen = true;
        wrap.classList.add("open");
        bar.classList.add("shifted");
        setTimeout(() => document.getElementById("searchInput").focus(), 300);
    }
}

/* ================================================
   EVENT LISTENERS
   ================================================ */
function initEvents() {
    // Поиск
    document.getElementById("btnSearch").addEventListener("click", () => toggleSearch());
    document.getElementById("searchClose").addEventListener("click", () => toggleSearch(true));
    document.getElementById("searchInput").addEventListener("input", (e) => {
        state.searchQuery = e.target.value;
        renderCatalog();
    });

    // Корзина
    document.getElementById("btnCart").addEventListener("click", openCart);

    // Детали
    document.getElementById("detailBack").addEventListener("click", closeDetail);
    document.getElementById("detailClose").addEventListener("click", closeDetail);
    document.getElementById("detailAddBtn").addEventListener("click", () => {
        if (!state.selectedProduct) return;
        const p = state.selectedProduct;
        const existing = getCartItem(p.id);
        if (existing) existing.quantity++;
        else state.cart.push({ product: p, quantity: 1 });
        saveCart(); updateCartBadge(); updateCardAddButtons();
        const btn = document.getElementById("detailAddBtn");
        btn.innerHTML = '<i class="fas fa-shopping-bag"></i> Уже в корзине';
        btn.classList.add("in-cart-state");
        showToast("Добавлено в корзину");
    });

    // Корзина — назад
    document.getElementById("cartBack").addEventListener("click", closeCart);

    // Backdrop
    document.getElementById("overlayBackdrop").addEventListener("click", () => {
        if (state.view === "detail") closeDetail();
        else if (state.view === "cart") closeCart();
    });

    // Checkout
    document.getElementById("checkoutBg").addEventListener("click", closeCheckout);
    document.getElementById("submitOrder").addEventListener("click", submitOrder);

    // Форма — убираем ошибки при вводе
    document.getElementById("inputName").addEventListener("input", () => {
        document.getElementById("inputName").classList.remove("error");
        document.getElementById("errorName").classList.remove("show");
    });
    document.getElementById("inputTg").addEventListener("input", () => {
        document.getElementById("inputTg").classList.remove("error");
        document.getElementById("errorTg").classList.remove("show");
        // Автодобавление @
        const v = document.getElementById("inputTg").value;
        if (v.length > 0 && !v.startsWith("@")) document.getElementById("inputTg").value = "@" + v;
    });

    // Success
    document.getElementById("successBackBtn").addEventListener("click", closeSuccess);
    document.getElementById("successChatBtn").addEventListener("click", openChannel);
}

/* ================================================
   INIT
   ================================================ */
function init() {
    loadCart();
    loadFavorites();
    renderFilterBar();
    renderCatalog();
    updateCartBadge();
    initEvents();
    updateTgBack();
}

if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
} else {
    init();
}
</script>
</body>
</html>
